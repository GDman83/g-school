<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎒 啟盟學堂智慧字卡 HUB V13</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
    .ruby-container ruby { ruby-position: over; font-variant-east-asian: ruby; }
    .ruby-container rt { font-size: 0.35em; color: #475569; font-weight: 700; letter-spacing: 1px; padding-bottom: 4px; }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <header class="bg-gradient-to-r from-indigo-600 to-blue-700 text-white shadow-lg p-4 sticky top-0 z-50">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <div class="flex items-center cursor-pointer" onclick="backToMenu()">
        <i class="fa-solid fa-house-chimney mr-3 text-xl"></i>
        <h1 class="text-xl font-black tracking-wider">啟盟學堂</h1>
      </div>
      <span id="counter" class="bg-white/20 text-white text-xs font-bold px-3 py-1 rounded-full border border-white/30">
        正在連線數據總庫...
      </span>
    </div>
  </header>

  <div id="unit-menu" class="flex-grow flex flex-col items-center justify-center p-6 space-y-8">
    <div class="text-center space-y-2">
      <h2 class="text-3xl font-black text-slate-800">今天要學什麼呢？</h2>
      <p class="text-slate-500 font-medium tracking-widest">請選擇一個常規貨櫃區</p>
    </div>

    <div class="grid grid-cols-2 gap-4 w-full max-w-sm bg-white p-6 rounded-[2rem] shadow-xl">
      <button onclick="filterAndLoad('A')" class="py-6 bg-purple-600 hover:bg-purple-700 text-white font-black text-xl rounded-2xl shadow-md active:scale-95 transition-all">A 區 貨櫃庫</button>
      <button onclick="filterAndLoad('F')" class="py-6 bg-emerald-600 hover:bg-emerald-700 text-white font-black text-xl rounded-2xl shadow-md active:scale-95 transition-all">F 區 貨櫃庫</button>
      <button onclick="filterAndLoad('K')" class="py-6 bg-amber-600 hover:bg-amber-700 text-white font-black text-xl rounded-2xl shadow-md active:scale-95 transition-all">K 區 貨櫃庫</button>
      <button onclick="filterAndLoad('T')" class="py-6 bg-rose-600 hover:bg-rose-700 text-white font-black text-xl rounded-2xl shadow-md active:scale-95 transition-all">T 區 貨櫃庫</button>
      <button onclick="filterAndLoad('other')" class="col-span-2 py-5 bg-slate-500 hover:bg-slate-600 text-white font-black text-xl rounded-2xl shadow-md active:scale-95 transition-all flex items-center justify-center">
        <i class="fa-solid fa-box-open mr-2"></i> 其他編號區
      </button>
    </div>
  </div>

  <main id="card-viewer" class="hidden flex-grow flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl border border-white p-6 space-y-6 relative overflow-hidden">
      
      <div class="flex justify-between items-center">
        <button onclick="backToMenu()" class="text-slate-300 hover:text-slate-500 transition-colors"><i class="fa-solid fa-circle-arrow-left text-2xl"></i></button>
        <span id="card-id" class="text-slate-4400 font-black text-lg tracking-widest italic">#00</span>
        <button onclick="playAudio('main')" class="w-14 h-14 rounded-full bg-amber-400 text-white flex items-center justify-center shadow-lg active:scale-90 transition-all focus:outline-none">
          <i class="fa-solid fa-volume-high text-2xl"></i>
        </button>
      </div>

      <div class="flex flex-col items-center justify-center py-2 space-y-2">
        <div id="main-word-box" class="ruby-container text-7xl font-black text-slate-800 text-center leading-none"></div>
        <div id="sub-tip" class="text-slate-400 text-lg font-bold tracking-widest pt-2 text-center"></div>
      </div>

      <div class="flex justify-center items-center p-4 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 min-h-[160px]">
        <div id="image-display" class="text-8xl select-none drop-shadow-xl">🎒</div>
      </div>

      <div class="bg-indigo-50 rounded-3xl p-5 relative border border-indigo-100">
        <button onclick="absolutePlaySentence()" class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white text-indigo-600 flex items-center justify-center shadow-md active:scale-90 focus:outline-none">
          <i class="fa-solid fa-volume-high"></i>
        </button>
        <div class="space-y-4 pr-8">
          <div id="example-sentence" class="ruby-container text-2xl font-bold text-slate-800 leading-normal"></div>
          <p id="vietnamese-translation" class="text-indigo-500 font-bold text-lg italic border-t border-indigo-200 pt-3"></p>
        </div>
      </div>
    </div>
  </main>

  <footer id="card-footer" class="hidden bg-white border-t border-slate-200 p-6 sticky bottom-0 z-50">
    <div class="max-w-md mx-auto space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <button onclick="navigateCard(-1)" class="py-5 bg-slate-100 text-slate-600 font-black text-xl rounded-2xl active:scale-95 flex items-center justify-center transition-all">
          <i class="fa-solid fa-chevron-left mr-2"></i> 上一頁
        </button>
        <button onclick="navigateCard(1)" class="py-5 bg-indigo-600 text-white font-black text-xl rounded-2xl shadow-xl active:scale-95 flex items-center justify-center transition-all">
          下一頁 <i class="fa-solid fa-chevron-right ml-2"></i>
        </button>
      </div>
    </div>
  </footer>

  <script>
    let globalAllData = [];       
    let currentFilteredData = []; 
    let currentIndex = 0;
    let currentAudio = null;

    function switchView(targetId) {
      const views = ['unit-menu', 'card-viewer', 'card-footer'];
      views.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.add('hidden');
      });
      
      const targetEl = document.getElementById(targetId);
      if (targetEl) targetEl.classList.remove('hidden');
      
      if (targetId === 'card-viewer') {
        const footer = document.getElementById('card-footer');
        if (footer) footer.classList.remove('hidden');
      }
    }

    function backToMenu() {
      if (currentAudio) currentAudio.pause();
      switchView('unit-menu');
      updateCounterText();
    }

    function updateCounterText() {
      const counter = document.getElementById('counter');
      if (globalAllData && globalAllData.length > 0) {
        counter.innerText = `總庫：共 ${globalAllData.length} 筆`;
      } else {
        counter.innerText = "等待同步數據...";
      }
    }

    // 🚀 背景默默強制加載
    async function loadGlobalDatabase() {
      try {
        const response = await fetch(`school_total.md?t=${Date.now()}`);
        if (!response.ok) throw new Error("檔案不存在");
        const textData = await response.text();
        globalAllData = JSON.parse(textData);
        updateCounterText();
      } catch (error) {
        console.log("背景讀取中:", error.message);
        document.getElementById('counter').innerText = "等待同步數據";
      }
    }

    // 💡 超強健篩選引擎：點擊時如果沒資料，現場暴力重抓，絕不彈窗阻擋
    async function filterAndLoad(key) {
      if (!globalAllData || globalAllData.length === 0) {
        document.getElementById('counter').innerText = "正在調貨中...";
        try {
          const response = await fetch(`school_total.md?t=${Date.now()}`);
          if (!response.ok) throw new Error();
          const textData = await response.text();
          globalAllData = JSON.parse(textData);
          updateCounterText();
        } catch (e) {
          // 如果真的沒有檔案，溫柔提示，不卡死網頁
          document.getElementById('counter').innerText = "請先至試算表點擊同步";
          alert("🎒 提示：尚未偵測到您的 school_total.md 總庫檔案！\n\n請確認您已在 Google 試算表成功執行完『智慧總庫同步』且無中途取消唷！");
          return;
        }
      }

      if (key === 'other') {
        currentFilteredData = globalAllData.filter(item => {
          const rawId = item.id || item.ID || "";
          const idStr = String(rawId).trim();
          return idStr && !/^[AFKT]/i.test(idStr);
        });
      } else {
        currentFilteredData = globalAllData.filter(item => {
          const rawId = item.id || item.ID || "";
          const idStr = String(rawId).trim();
          return idStr && idStr.toUpperCase().startsWith(key.toUpperCase());
        });
      }

      if (currentFilteredData.length === 0) {
        alert(`提示：區域【${key === 'other' ? '其他' : key}】目前沒有符合的教材唷！`);
        return;
      }

      switchView('card-viewer');
      renderCard(0);
    }

    function renderCard(index) {
      currentIndex = index;
      const card = currentFilteredData[index];
      
      const id = card.id || card.ID || "00";
      const word = card.word || card.Word || "";
      const pinyin = card.pinyin || card.Pinyin || "";
      const zhuyin = card.zhuyin || card.Zhuyin || "";
      const example = card.example || card.Example || "";
      const vn = card.vietnamese || card.vietnam || card.vn || card.VN || "";
      const img = card.imgCode || card.ImgCode || "🎒";

      document.getElementById('counter').innerText = `${currentIndex + 1} / ${currentFilteredData.length}`;
      document.getElementById('card-id').innerText = `# ${id}`;
      document.getElementById('sub-tip').innerText = (pinyin === "-" || pinyin === "undefined") ? "" : pinyin;
      document.getElementById('main-word-box').innerHTML = buildRubyString(word, zhuyin);
      document.getElementById('image-display').innerText = (img && img !== "-") ? img : "🎒";
      document.getElementById('example-sentence').innerHTML = buildRubyString((example === "-" || example === "undefined") ? "" : example, "");
      document.getElementById('vietnamese-translation').innerText = (vn === "-" || vn === "undefined") ? "" : vn;
    }

    function buildRubyString(word, zhuyin) {
      if (!zhuyin || zhuyin === "-" || zhuyin === "undefined") return word;
      const charArray = word.split('');
      const zhuyinArray = zhuyin.includes(' ') ? zhuyin.split(' ') : zhuyin.split(',');
      if (charArray.length === zhuyinArray.length) {
        return charArray.map((char, i) => `<ruby>${char}<rt>${zhuyinArray[i]}</rt></ruby>`).join('');
      }
      return `<ruby>${word}<rt>${zhuyin}</rt></ruby>`;
    }

    function playAudio(type) {
      const card = currentFilteredData[currentIndex];
      if (currentAudio) currentAudio.pause();
      
      const id = card.id || card.ID;
      const filename = type === 'main' ? `school_${id}_main.mp3` : `school_${id}_sentence.mp3`;
      
      currentAudio = new Audio(`audio/${filename}`);
      currentAudio.play().catch(e => {
        console.log("語音播放失敗，可能尚未轉換完成");
      });
    }

    function absolutePlaySentence() {
      playAudio('sentence');
    }

    function navigateCard(step) {
      let nextIndex = currentIndex + step;
      if (nextIndex < 0) nextIndex = 0;
      if (nextIndex >= currentFilteredData.length) nextIndex = currentFilteredData.length - 1;
      renderCard(nextIndex);
    }

    window.onload = () => {
      loadGlobalDatabase(); 
    };
  </script>
</body>
</html>
