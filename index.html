<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎒 啟盟學堂智慧字卡 HUB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
    /* 精準控制注音與文字的上下緊密排版 */
    .ruby-container ruby { ruby-position: over; font-variant-east-asian: ruby; }
    .ruby-container rt { font-size: 0.35em; color: #475569; font-weight: 700; letter-spacing: 1px; padding-bottom: 4px; }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white shadow-md p-4 sticky top-0 z-50">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <h1 class="text-xl font-black tracking-wider"><i class="fa-solid fa-graduation-cap mr-2"></i>啟盟學堂</h1>
      <span id="counter" class="bg-white text-indigo-700 text-sm font-bold px-3 py-1 rounded-full shadow-inner">載入中...</span>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl border border-slate-100 p-6 space-y-6 relative overflow-hidden transition-all duration-300">
      
      <div class="flex justify-between items-center">
        <span id="card-id" class="text-slate-400 font-extrabold text-lg tracking-widest">#00</span>
        <button onclick="playAudio('main')" class="w-12 h-12 rounded-full bg-amber-50 hover:bg-amber-100 border border-amber-200 text-amber-600 flex items-center justify-center shadow-sm transition-all active:scale-95 group focus:outline-none">
          <i class="fa-solid fa-volume-high text-xl group-hover:scale-110 transition-transform"></i>
        </button>
      </div>

      <div class="flex flex-col items-center justify-center py-4 space-y-4">
        <div id="main-word-box" class="ruby-container text-6xl md:text-7xl font-black text-slate-800 tracking-wide text-center">
          </div>
        <div id="sub-tip" class="text-slate-400 text-sm font-medium"></div>
      </div>

      <div class="flex justify-center items-center p-4 bg-slate-50 rounded-2xl border border-dashed border-slate-200 min-h-[140px]">
        <div id="image-display" class="text-7xl select-none filter drop-shadow-md">
          </div>
      </div>

      <div class="bg-indigo-50/50 rounded-2xl p-5 border border-indigo-100/60 relative group">
        <button onclick="playAudio('sentence')" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-white hover:bg-indigo-100 text-indigo-600 flex items-center justify-center shadow-sm transition-all active:scale-95 focus:outline-none">
          <i class="fa-solid fa-volume-high text-xs"></i>
        </button>
        
        <div class="space-y-3 pr-6">
          <div id="example-sentence" class="ruby-container text-xl md:text-2xl font-bold text-slate-800 leading-relaxed">
            </div>
          <div class="border-t border-indigo-100 my-2"></div>
          <p id="vietnamese-translation" class="text-slate-500 font-medium text-base italic md:text-lg">
            </p>
        </div>
      </div>

    </div>
  </main>

  <footer class="bg-white border-t border-slate-200 p-4 sticky bottom-0 z-50">
    <div class="max-w-md mx-auto space-y-3">
      <div class="grid grid-cols-2 gap-4">
        <button onclick="navigateCard(-1)" class="py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 font-black text-lg rounded-2xl shadow-sm transition-all active:scale-95 focus:outline-none flex items-center justify-center">
          <i class="fa-solid fa-chevron-left mr-2"></i> 上一個
        </button>
        <button onclick="navigateCard(1)" class="py-4 bg-slate-800 hover:bg-slate-900 text-white font-black text-lg rounded-2xl shadow-md transition-all active:scale-95 focus:outline-none flex items-center justify-center">
          下一個 <i class="fa-solid fa-chevron-right ml-2"></i>
        </button>
      </div>
      <div class="grid grid-cols-2 gap-4 text-xs font-bold text-slate-400">
        <button onclick="navigateCard(-10)" class="py-2 hover:text-slate-600 transition-colors focus:outline-none"><i class="fa-solid fa-angles-left mr-1"></i> 快退 10 筆</button>
        <button onclick="navigateCard(10)" class="py-2 hover:text-slate-600 transition-colors focus:outline-none text-right">快進 10 筆 <i class="fa-solid fa-angles-right ml-1"></i></button>
      </div>
    </div>
  </footer>

  <script>
    let cardsData = [];
    let currentIndex = 0;
    let currentAudio = null;

    // 🚀 初始化：從 GitHub 城堡抓取唯一的全校總清單
    async function initG_School() {
      try {
        // 直接讀取工頭一車拉過來的唯一實心總表
        const response = await fetch('school_total.md');
        if (!response.ok) throw new Error('無法讀取總表檔案');
        const text = await response.text();
        parseMarkdownData(text);
        
        if(cardsData.length > 0) {
          renderCard(0);
        } else {
          document.getElementById('main-word-box').innerText = "倉庫空空如也";
        }
      } catch (error) {
        console.error(error);
        document.getElementById('main-word-box').innerText = "連線城堡失敗";
      }
    }

    // 📋 解析 Markdown 數據，精準還原欄位
    function parseMarkdownData(mdText) {
      const lines = mdText.split('\n');
      cardsData = [];
      
      for (let i = 2; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line || !line.startsWith('|')) continue;
        
        // 欄位切分：| 編號 | 主要展示 | 輔助提示 | 純正注音 | 生活例句 | 越南文翻譯 | 圖形代碼 |
        const cols = line.split('|').map(c => c.trim());
        if (cols.length < 8) continue;
        
        const id = cols[1];
        const main = cols[2];
        const sub = cols[3];
        const zhuyin = cols[4];  // 這是純注音！
        const example = cols[5];
        const vn = cols[6];
        const imgCode = cols[7];
        
        if (!main) continue;
        
        cardsData.push({ id, main, sub, zhuyin, example, vn, imgCode });
      }
    }

    // 💥 智慧渲染引擎：將漢字與注音完美黏合
    function renderCard(index) {
      if (index < 0 || index >= cardsData.length) return;
      currentIndex = index;
      const card = cardsData[index];
      
      // 更新計數器與編號
      document.getElementById('counter').innerText = `${currentIndex + 1} / ${cardsData.length}`;
      document.getElementById('card-id').innerText = `# ${card.id}`;
      document.getElementById('sub-tip').innerText = card.sub === "-" ? "" : card.sub;
      
      // 1. 處理主要詞彙 (漢字 + 注音) 的黏合
      const mainBox = document.getElementById('main-word-box');
      mainBox.innerHTML = buildRubyString(card.main, card.zhuyin);
      
      // 2. 處理圖片資產
      const imgBox = document.getElementById('image-display');
      imgBox.innerText = (card.imgCode && card.imgCode !== "-") ? card.imgCode : "🎒";
      
      // 3. 處理應用例句 (自動分離中越文，並為中文做基本的排版)
      const exampleBox = document.getElementById('example-sentence');
      if(card.example && card.example !== "-") {
        // 這裡未來可進一步對齊例句注音，目前先放大純中文字體
        exampleBox.innerText = card.example;
        exampleBox.parentElement.parentElement.classList.remove('hidden');
      } else {
        exampleBox.innerText = "";
        exampleBox.parentElement.parentElement.classList.add('hidden');
      }
      
      // 4. 處理越南文
      document.getElementById('vietnamese-translation').innerText = (card.vn && card.vn !== "-") ? card.vn : "";
    }

    // 🧩 漢字與注音的智能黏合演算法 (按字數或空格拆分對齊)
    function buildRubyString(word, zhuyin) {
      if (!zhuyin || zhuyin === "-") return word;
      
      const charArray = word.split('');
      // 支援注音用空格或逗號隔開的狀況
      const zhuyinArray = zhuyin.includes(' ') ? zhuyin.split(' ') : zhuyin.split(',');
      
      // 如果兩邊長度一致，完美一對一綁定
      if (charArray.length === zhuyinArray.length) {
        return charArray.map((char, i) => `<ruby>${char}<rt>${zhuyinArray[i]}</rt></ruby>`).join('');
      }
      
      // 如果長度不一致，直接把整串注音頂在上方展示，絕不穿幫
      return `<ruby>${word}<rt>${zhuyin}</rt></ruby>`;
    }

    // 🎵 城堡物流音訊播放器
    function playAudio(type) {
      if (cardsData.length === 0) return;
      const card = cardsData[currentIndex];
      
      // 暫停上一個正在播的聲音
      if (currentAudio) {
        currentAudio.pause();
      }
      
      // 精準指向工頭幫我們命名好的 MP3 檔案門牌
      const filename = type === 'main' ? `school_${card.id}_main.mp3` : `school_${card.id}_sentence.mp3`;
      const audioUrl = `audio/${filename}`;
      
      currentAudio = new Audio(audioUrl);
      currentAudio.play().catch(e => {
        console.log("🔊 提示：此音頻目前在 GitHub 城堡中卡住或尚未由 TTS 生成完畢，下次接關同步後即可補齊！");
      });
    }

    // 🎮 導航切換控制
    function navigateCard(step) {
      let nextIndex = currentIndex + step;
      if (nextIndex < 0) nextIndex = 0;
      if (nextIndex >= cardsData.length) nextIndex = cardsData.length - 1;
      renderCard(nextIndex);
    }

    // 啟動大樓！
    window.onload = initG_School;
  </script>
</body>
</html>
