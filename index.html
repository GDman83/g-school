<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G學園 - 中文啟蒙學堂</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Poppins:wght@600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC05;
            --google-green: #34A853;
            --text-main: #0F172A;
            --text-muted: #475569;
            --bg-app: #F8FAFC;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #CBD5E1; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .phone-container { width: 100%; max-width: 414px; height: 100vh; max-height: 850px; background-color: var(--bg-app); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        @media (min-width: 450px) { .phone-container { height: 820px; border: 12px solid #1E293B; border-radius: 40px; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.4); } }
        .app-header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; background: #FFFFFF; border-bottom: 1px solid #E2E8F0; }
        .app-title { font-weight: 900; color: var(--google-blue); font-size: 20px; }
        .counter { background: #EEF2F6; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 700; color: var(--google-blue); font-family: 'Poppins', sans-serif; }
        .card-area { flex: 1; padding: 24px; display: flex; flex-direction: column; justify-content: center; }
        .study-card { background: white; border-radius: 32px; padding: 30px 24px; box-shadow: 0 10px 30px rgba(15,23,42,0.04); display: flex; flex-direction: column; position: relative; min-height: 420px; }
        .audio-trigger-btn { position: absolute; top: 24px; right: 24px; width: 44px; height: 44px; background: #EEF2F6; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--google-blue); font-size: 16px; }
        
        /* 序號與拼音 */
        .meta-row { display: flex; align-items: baseline; gap: 12px; margin-top: 25px; margin-bottom: 10px; justify-content: center; }
        .card-id { font-family: 'Poppins', sans-serif; font-size: 48px; font-weight: 900; color: #1E293B; }
        .pinyin-text { font-family: 'Poppins', sans-serif; font-size: 24px; font-weight: 600; color: var(--google-red); }
        
        /* 單字與注音 */
        .main-word-row { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 16px; }
        .main-word { font-size: 52px; font-weight: 900; color: var(--text-main); letter-spacing: -1px; }
        .zhuyin-text { font-size: 18px; font-weight: 700; color: var(--google-green); border-left: 2px dashed #CBD5E1; padding-left: 12px; white-space: pre-line; line-height: 1.4; text-align: left; }
        
        .hint-badge { display: flex; justify-content: center; margin-bottom: 25px; }
        .hint-tag { background: #F1F5F9; color: var(--text-muted); padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; }
        .divider { height: 1px; background: #F1F5F9; margin-bottom: 25px; }
        
        /* 例句區 */
        .sentence-section { display: flex; flex-direction: column; gap: 12px; flex: 1; justify-content: center; }
        .target-sentence { font-size: 22px; font-weight: 700; color: var(--google-blue); text-align: center; line-height: 1.4; }
        .translation-box { background: #F8FAFC; border-radius: 16px; padding: 12px 16px; border: 1px solid #F1F5F9; }
        .translation-sentence { font-size: 15px; color: var(--text-muted); text-align: center; line-height: 1.5; font-weight: 500; }
        
        /* 導航欄 */
        .nav-bar { padding: 20px 24px 30px; display: flex; gap: 16px; background: white; border-top: 1px solid #E2E8F0; }
        .nav-btn { flex: 1; padding: 16px; border-radius: 24px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: background 0.2s; }
        .btn-prev { background: #F1F5F9; color: var(--text-main); }
        .btn-next { background: var(--google-blue); color: white; box-shadow: 0 8px 20px rgba(66, 133, 244, 0.3); }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="app-header">
            <div class="app-title"><i class="fas fa-graduation-cap"></i> G-School</div>
            <div id="card-counter" class="counter">0 / 0</div>
        </div>

        <div class="card-area">
            <div class="study-card">
                <button class="audio-trigger-btn" onclick="playCurrentAudio()"><i class="fas fa-volume-up"></i></button>
                
                <div class="meta-row">
                    <span id="lbl-id" class="card-id">--</span>
                    <span id="lbl-pinyin" class="pinyin-text">--</span>
                </div>

                <div class="main-word-row">
                    <div id="lbl-word" class="main-word">--</div>
                    <div id="lbl-zhuyin" class="zhuyin-text">--</div>
                </div>
                
                <div class="hint-badge"><div id="lbl-hint" class="hint-tag">提示: --</div></div>
                <div class="divider"></div>
                
                <div class="sentence-section">
                    <div id="lbl-sentence-zh" class="target-sentence">--</div>
                    <div class="translation-box">
                        <div id="lbl-sentence-vi" class="translation-sentence">--</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="nav-bar">
            <button class="nav-btn btn-prev" onclick="prevCard()"><i class="fas fa-arrow-left"></i> 上一字</button>
            <button class="nav-btn btn-next" onclick="nextCard()">下一字 <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <script>
        let db = [];
        let currentIndex = 0;

        // 直接拉取並解析 data.md
        async function loadCardsFromMD() {
            try {
                const response = await fetch(`./data.md?v=${Date.now()}`);
                const text = await response.text();
                
                const lines = text.split('\n');
                let tempDb = [];
                
                lines.forEach(line => {
                    if (line.includes('|')) {
                        const cols = line.split('|').map(c => c.trim());
                        
                        // 確保是有效的表格資料列（過濾掉標頭與分隔線）
                        if (cols.length >= 7 && cols[1] && !cols[1].includes('---') && !cols[1].includes('編號')) {
                            const id = cols[1];
                            const word = cols[2];
                            const pinyin = cols[3];
                            const zhuyin = cols[4];
                            const sentence_zh = cols[5];
                            const sentence_vi = cols[6];

                            tempDb.push({
                                id, word, pinyin, zhuyin, sentence_zh, sentence_vi
                            });
                        }
                    }
                });

                if(tempDb.length > 0) {
                    db = tempDb;
                    renderCard();
                } else {
                    console.error("未能從 data.md 解析出有效數據。");
                }
            } catch (error) {
                console.error("讀取 data.md 失敗：", error);
            }
        }

        function renderCard() {
            if(db.length === 0) return;
            const current = db[currentIndex];
            
            document.getElementById("lbl-id").textContent = current.id || "";
            document.getElementById("lbl-word").textContent = current.word || "--";
            document.getElementById("lbl-pinyin").textContent = current.pinyin || "";
            document.getElementById("lbl-zhuyin").textContent = current.zhuyin || "--";
            document.getElementById("lbl-hint").textContent = `提示: ${current.word || "--"}`;
            document.getElementById("lbl-sentence-zh").textContent = current.sentence_zh || "--";
            document.getElementById("lbl-sentence-vi").textContent = current.sentence_vi || "--";
            
            document.getElementById("card-counter").textContent = `${currentIndex + 1} / ${db.length}`;
        }

        function nextCard() { if (currentIndex < db.length - 1) { currentIndex++; renderCard(); playCurrentAudio(); } }
        function prevCard() { if (currentIndex > 0) { currentIndex--; renderCard(); playCurrentAudio(); } }

        function playCurrentAudio() {
            if(db.length === 0 || !('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const current = db[currentIndex];
            // 優先朗讀中文例句，若無例句則朗讀單詞
            const textToSpeak = current.sentence_zh || current.word;
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'zh-TW';
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        }

        // PWA 服務註冊
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker 註冊成功'))
                    .catch(err => console.log('Service Worker 註冊失敗', err));
            });
        }

        window.addEventListener('DOMContentLoaded', loadCardsFromMD);
    </script>
</body>
</html>
