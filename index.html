<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎒 啟盟學堂智慧字卡 HUB V9</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
    .ruby-container ruby { ruby-position: over; font-variant-east-asian: ruby; }
    .ruby-container rt { font-size: 0.35em; color: #475569; font-weight: 700; letter-spacing: 1px; padding-bottom: 4px; }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <header class="bg-gradient-to-r from-indigo-600 to-blue-700 text-white shadow-lg p-4 sticky top-0 z-50">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <div class="flex items-center cursor-pointer" onclick="backToMenu()">
        <i class="fa-solid fa-house-chimney mr-3 text-xl"></i>
        <h1 class="text-xl font-black tracking-wider">啟盟學堂</h1>
      </div>
      <span id="counter" class="bg-white/20 text-white text-xs font-bold px-3 py-1 rounded-full border border-white/30">
        正在載入總庫...
      </span>
    </div>
  </header>

  <div id="unit-menu" class="hidden flex-grow flex flex-col items-center justify-center p-6 space-y-8">
    <div class="text-center space-y-2">
      <h2 class="text-3xl font-black text-slate-800">今天要學什麼呢？</h2>
      <p class="text-slate-500 font-medium tracking-widest">請選擇一個學習單元</p>
    </div>

    <div class="w-full max-w-sm space-y-4">
      <button onclick="switchView('core-selector')" class="w-full bg-white p-6 rounded-3xl shadow-xl border-b-8 border-indigo-200 active:border-b-0 active:translate-y-2 transition-all flex items-center group">
        <div class="w-16 h-16 rounded-2xl bg-indigo-100 flex items-center justify-center text-3xl mr-5 group-hover:scale-110 transition-transform">🌟</div>
        <div class="text-left">
          <h3 class="text-xl font-black text-slate-800">核心識字學堂</h3>
          <p class="text-slate-400 text-sm">依編號字母分類大貨櫃</p>
        </div>
      </button>

      <button onclick="switchView('zhuyin-selector')" class="w-full bg-white p-6 rounded-3xl shadow-xl border-b-8 border-amber-200 active:border-b-0 active:translate-y-2 transition-all flex items-center group">
        <div class="w-16 h-16 rounded-2xl bg-amber-100 flex items-center justify-center text-3xl mr-5 group-hover:scale-110 transition-transform">ㄅ</div>
        <div class="text-left">
          <h3 class="text-xl font-black text-slate-800">注音符號學堂</h3>
          <p class="text-slate-400 text-sm">37個注音智慧分流櫃</p>
        </div>
      </button>
    </div>
  </div>

  <div id="core-selector" class="hidden flex-grow flex flex-col items-center justify-center p-6 space-y-6">
    <div class="text-center">
      <h2 class="text-2xl font-black text-slate-800">請選擇常規貨櫃區</h2>
    </div>
    <div class="grid grid-cols-2 gap-4 w-full max-w-xs">
      <button onclick="filterAndLoad('letter', 'A')" class="py-4 bg-purple-600 hover:bg-purple-700 text-white font-black text-lg rounded-2xl shadow-md">A 區 貨櫃庫</button>
      <button onclick="filterAndLoad('letter', 'F')" class="py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-black text-lg rounded-2xl shadow-md">F 區 貨櫃庫</button>
      <button onclick="filterAndLoad('letter', 'K')" class="py-4 bg-amber-600 hover:bg-amber-700 text-white font-black text-lg rounded-2xl shadow-md">K 區 貨櫃庫</button>
      <button onclick="filterAndLoad('letter', 'T')" class="py-4 bg-rose-600 hover:bg-rose-700 text-white font-black text-lg rounded-2xl shadow-md">T 區 貨櫃庫</button>
      <button onclick="filterAndLoad('letter', 'other')" class="col-span-2 py-4 bg-slate-500 hover:bg-slate-600 text-white font-black text-lg rounded-2xl shadow-md">其他編號區</button>
    </div>
    <button onclick="backToMenu()" class="text-slate-400 font-bold hover:text-slate-600 mt-4"><i class="fa-solid fa-arrow-left"></i> 返回上一層</button>
  </div>

  <div id="zhuyin-selector" class="hidden flex-grow flex flex-col items-center justify-center p-4 space-y-4">
    <div class="text-center">
      <h2 class="text-2xl font-black text-slate-800">請選擇注音分流櫃</h2>
    </div>
    <div id="zhuyin-grid" class="grid grid-cols-5 gap-3 w-full max-w-sm bg-white p-5 rounded-3xl shadow-xl">
      </div>
    <button onclick="backToMenu()" class="text-slate-400 font-bold hover:text-slate-600"><i class="fa-solid fa-arrow-left"></i> 返回上一層</button>
  </div>

  <main id="card-viewer" class="hidden flex-grow flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl border border-white p-6 space-y-6 relative overflow-hidden">
      
      <div class="flex justify-between items-center">
        <button onclick="backToSelector()" class="text-slate-300 hover:text-slate-500 transition-colors"><i class="fa-solid fa-circle-arrow-left text-2xl"></i></button>
        <span id="card-id" class="text-slate-400 font-black text-lg tracking-widest italic">#00</span>
        <button onclick="playAudio('main')" class="w-14 h-14 rounded-full bg-amber-400 text-white flex items-center justify-center shadow-lg active:scale-90 transition-all focus:outline-none">
          <i class="fa-solid fa-volume-high text-2xl"></i>
        </button>
      </div>

      <div class="flex flex-col items-center justify-center py-2 space-y-2">
        <div id="main-word-box" class="ruby-container text-7xl font-black text-slate-800 text-center leading-none"></div>
        <div id="sub-tip" class="text-slate-400 text-lg font-bold tracking-widest pt-2 text-center"></div>
      </div>

      <div class="flex justify-center items-center p-4 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 min-h-[160px]">
        <div id="image-display" class="text-8xl select-none drop-shadow-xl">🎒</div>
      </div>

      <div class="bg-indigo-50 rounded-3xl p-5 relative border border-indigo-100">
        <button onclick="playAudio('sentence')" class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white text-indigo-600 flex items-center justify-center shadow-md active:scale-90 focus:outline-none">
          <i class="fa-solid fa-volume-high"></i>
        </button>
        <div class="space-y-4 pr-8">
          <div id="example-sentence" class="ruby-container text-2xl font-bold text-slate-800 leading-normal"></div>
          <p id="vietnamese-translation" class="text-indigo-500 font-bold text-lg italic border-t border-indigo-200 pt-3"></p>
        </div>
      </div>
    </div>
  </main>

  <footer id="card-footer" class="hidden bg-white border-t border-slate-200 p-6 sticky bottom-0 z-50">
    <div class="max-w-md mx-auto space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <button onclick="navigateCard(-1)" class="py-5 bg-slate-100 text-slate-600 font-black text-xl rounded-2xl active:scale-95 flex items-center justify-center transition-all">
          <i class="fa-solid fa-chevron-left mr-2"></i> 上一頁
        </button>
        <button onclick="navigateCard(1)" class="py-5 bg-indigo-600 text-white font-black text-xl rounded-2xl shadow-xl active:scale-95 flex items-center justify-center transition-all">
          下一頁 <i class="fa-solid fa-chevron-right ml-2"></i>
        </button>
      </div>
    </div>
  </footer>

  <script>
    let globalAllData = [];       // 儲存從 school_total.md 解析出來的完整總庫
    let currentFilteredData = []; // 目前篩選出來的區域字卡
    let currentIndex = 0;
    let currentAudio = null;
    let currentActiveSelector = 'core-selector';

    const zhuyins = ["ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ","ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","盤","ㄖ","ㄗ","ㄘ","ㄙ","ㄚ","ㄛ","ㄜ","ㄝ","AI","ㄟ","ㄠ","ㄡ","ㄢ","ㄣ","ㄤ","ㄥ","ㄦ","ㄧ","ㄨ","ㄩ"];

    function initZhuyinGrid() {
      const grid = document.getElementById('zhuyin-grid');
      grid.innerHTML = zhuyins.map(z => 
        `<button onclick="filterAndLoad('zhuyin', '${z}')" class="py-3 bg-amber-50 hover:bg-amber-100 text-slate-700 text-xl font-black rounded-xl transition-all border border-amber-200/60 active:scale-90">${z}</button>`
      ).join('');
    }

    // 🚀 初始化核心：直接去抓取主線上的 school_total.md 總庫
    async function loadGlobalDatabase() {
      try {
        const response = await fetch(`school_total.md?t=${Date.now()}`);
        if (!response.ok) throw new Error("找不到 school_total.md 總表庫檔案！");
        const textData = await response.text();
        
        // 解析 JSON 內容
        globalAllData = JSON.parse(textData);
        
        document.getElementById('counter').innerText = "總庫載入成功！";
        switchView('unit-menu');
      } catch (error) {
        alert(`🚨 載入核心總庫失敗: ${error.message}\n請確認根目錄是否有 school_total.md 且格式正確。`);
        document.getElementById('counter').innerText = "載入失敗";
      }
    }

    // 💡 智慧分流引擎：直接在前端對總名單進行即時篩選
    function filterAndLoad(type, key) {
      if (type === 'letter') {
        if (key === 'other') {
          currentFilteredData = globalAllData.filter(item => !/^[AFKT]/i.test(item.id));
        } else {
          currentFilteredData = globalAllData.filter(item => item.id.toUpperCase().startsWith(key));
        }
      } else if (type === 'zhuyin') {
        currentFilteredData = globalAllData.filter(item => item.zhuyin && item.zhuyin.trim().startsWith(key));
      }

      if (currentFilteredData.length === 0) {
        alert(`明細提示：目前在【${key}】區域中找不到對應的教材資料唷！`);
        return;
      }

      switchView('card-viewer');
      renderCard(0);
    }

    function switchView(targetId) {
      const views = ['unit-menu', 'core-selector', 'zhuyin-selector', 'card-viewer', 'card-footer'];
      views.forEach(id => document.getElementById(id).classList.add('hidden'));
      
      document.getElementById(targetId).classList.remove('hidden');
      if (targetId === 'core-selector' || targetId === 'zhuyin-selector') {
        currentActiveSelector = targetId;
      }
      if (targetId === 'card-viewer') {
        document.getElementById('card-footer').classList.remove('hidden');
      }
    }

    function backToMenu() {
      switchView('unit-menu');
      document.getElementById('counter').innerText = `總庫：共 ${globalAllData.length} 筆`;
    }

    function backToSelector() {
      if (currentAudio) currentAudio.pause();
      switchView(currentActiveSelector);
    }

    function renderCard(index) {
      currentIndex = index;
      const card = currentFilteredData[index];
      
      document.getElementById('counter').innerText = `${currentIndex + 1} / ${currentFilteredData.length}`;
      document.getElementById('card-id').innerText = `# ${card.id}`;
      document.getElementById('sub-tip').innerText = card.pinyin || "";
      document.getElementById('main-word-box').innerHTML = buildRubyString(card.word, card.zhuyin);
      document.getElementById('image-display').innerText = (card.imgCode && card.imgCode !== "-") ? card.imgCode : "🎒";
      document.getElementById('example-sentence').innerHTML = buildRubyString(card.example || "", "");
      document.getElementById('vietnamese-translation').innerText = card.vietnamese || card.vn || "";
    }

    function buildRubyString(word, zhuyin) {
      if (!zhuyin || zhuyin === "-") return word;
      const charArray = word.split('');
      const zhuyinArray = zhuyin.includes(' ') ? zhuyin.split(' ') : zhuyin.split(',');
      if (charArray.length === zhuyinArray.length) {
        return charArray.map((char, i) => `<ruby>${char}<rt>${zhuyinArray[i]}</rt></ruby>`).join('');
      }
      return `<ruby>${word}<rt>${zhuyin}</rt></ruby>`;
    }

    function playAudio(type) {
      const card = currentFilteredData[currentIndex];
      if (currentAudio) currentAudio.pause();
      
      // 直接指向 audio 資料夾下的音軌
      const filename = type === 'main' ? `school_${card.id}_main.mp3` : `school_${card.id}_sentence.mp3`;
      
      currentAudio = new Audio(`audio/${filename}`);
      currentAudio.play().catch(e => alert("語音檔案尚未生成，或正在上傳中！"));
    }

    function navigateCard(step) {
      let nextIndex = currentIndex + step;
      if (nextIndex < 0) nextIndex = 0;
      if (nextIndex >= currentFilteredData.length) nextIndex = currentFilteredData.length - 1;
      renderCard(nextIndex);
    }

    window.onload = () => {
      initZhuyinGrid();
      loadGlobalDatabase(); // 網頁開啟時，自動連線加載大總表
    };
  </script>
</body>
</html>
