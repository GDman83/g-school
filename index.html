<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>啟盟學堂 G-School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lexend', 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card-shadow { box-shadow: 0 20px 40px -15px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col antialiased select-none">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50 transition-all duration-300">
        <div class="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
            <button id="btnBackToHub" class="hidden flex items-center space-x-1 text-slate-500 hover:text-slate-800 transition active:scale-95">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
                <span class="font-bold text-base">返回主頁</span>
            </button>
            <div id="hubTitle" class="flex items-center space-x-2 mx-auto">
                <span class="text-xl">🎒</span>
                <h1 class="text-lg font-black text-slate-800 tracking-wide">啟盟學堂</h1>
            </div>
            <div class="w-10"></div> </div>
    </header>

    <main id="hubUniverse" class="flex-1 max-w-md w-full mx-auto px-5 py-8 flex flex-col justify-center space-y-6">
        <div class="text-center space-y-2 mb-4">
            <h2 class="text-2xl font-black text-slate-800 tracking-tight">小寶貝，今天想學什麼呢？</h2>
            <p class="text-sm text-slate-400 font-medium">請選擇一個進入學堂宇宙</p>
        </div>

        <button onclick="launchUniverse('core.md', '🌟 初階核心識字')" class="w-full bg-white border-2 border-slate-100 hover:border-amber-400 p-6 rounded-3xl card-shadow flex items-center space-x-5 transition duration-300 active:scale-95 group text-left">
            <div class="w-14 h-14 bg-amber-100 rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition">🌟</div>
            <div class="flex-1">
                <h3 class="text-lg font-bold text-slate-800">單元一：核心識字學堂</h3>
                <p class="text-xs text-slate-400 mt-0.5">常用核心漢字、生活應用配對</p>
            </div>
            <svg class="w-5 h-5 text-slate-300 group-hover:text-amber-500 transition" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </button>

        <button onclick="launchUniverse('zhuyin.md', 'ㄅ 注音符號啟蒙')" class="w-full bg-white border-2 border-slate-100 hover:border-indigo-400 p-6 rounded-3xl card-shadow flex items-center space-x-5 transition duration-300 active:scale-95 group text-left">
            <div class="w-14 h-14 bg-indigo-100 rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition">ㄅ</div>
            <div class="flex-1">
                <h3 class="text-lg font-bold text-slate-800">單元二：注音啟蒙學堂</h3>
                <p class="text-xs text-slate-400 mt-0.5">37正統注音符號、聲母韻母基礎</p>
            </div>
            <svg class="w-5 h-5 text-slate-300 group-hover:text-indigo-500 transition" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </button>
    </main>

    <main id="appUniverse" class="hidden flex-1 max-w-md w-full mx-auto px-4 py-4 flex flex-col justify-between">
        
        <div class="flex justify-between items-center px-2 mb-3">
            <span id="txtUnitTag" class="text-xs font-extrabold bg-slate-200 text-slate-600 px-3 py-1 rounded-full uppercase tracking-wider">UNIT</span>
            <span id="txtCounter" class="text-sm font-bold text-slate-400">0 / 0</span>
        </div>

        <div class="bg-white rounded-[32px] card-shadow border border-slate-100 p-6 flex flex-col justify-between flex-1 min-h-[420px] relative overflow-hidden transition-all duration-300">
            
            <div class="flex justify-between items-start z-10">
                <div class="text-left">
                    <span id="cardId" class="text-xs font-black text-slate-300 block">#01</span>
                    <span id="cardSub" class="text-base font-bold text-amber-500 mt-0.5 block">拼音載入中</span>
                </div>
                <button onclick="speakCurrentText('main')" class="w-12 h-12 bg-slate-50 hover:bg-amber-100 text-slate-600 hover:text-amber-600 rounded-2xl flex items-center justify-center transition active:scale-90 card-shadow">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z"/></svg>
                </button>
            </div>

            <div class="flex flex-col items-center justify-center flex-1 my-4 space-y-4">
                <h1 id="cardMain" class="text-7xl font-black text-slate-800 tracking-normal transition-all">字</h1>
                <div id="imgContainer" class="w-24 h-24 hidden transition-all duration-300">
                    <img id="cardImg" src="" class="w-full h-full object-contain" alt="圖形提示">
                </div>
            </div>

            <div id="sentenceBox" class="bg-slate-50 rounded-2xl p-4 border border-slate-100 space-y-2 relative group transition">
                <button onclick="speakCurrentText('sentence')" class="absolute top-3 right-3 w-8 h-8 bg-white text-slate-400 hover:text-amber-500 rounded-xl flex items-center justify-center shadow-sm transition active:scale-90">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z"/></svg>
                </button>
                <p id="cardExample" class="text-sm font-bold text-slate-700 pr-8 leading-relaxed">例句載入中...</p>
                <div class="border-t border-slate-200/60 my-1"></div>
                <p id="cardVN" class="text-xs font-semibold text-slate-400 leading-normal">Dịch nghĩa...</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-5">
            <button onclick="navigateCard(-1)" class="bg-white border border-slate-200 text-slate-600 font-bold py-4 px-6 rounded-2xl shadow-sm transition hover:bg-slate-50 active:scale-95 flex items-center justify-center space-x-2">
                <svg class="w-5 h-5 stroke-[3]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
                <span>上一個</span>
            </button>
            <button onclick="navigateCard(1)" class="bg-slate-900 text-white font-bold py-4 px-6 rounded-2xl shadow-md transition hover:bg-slate-800 active:scale-95 flex items-center justify-center space-x-2">
                <span>下一個</span>
                <svg class="w-5 h-5 stroke-[3]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
            </button>
        </div>
    </main>

    <script>
        // 🏰 全局數據保險箱
        let currentDatabase = [];
        let currentIndex = 0;
        const GITHUB_RAW_BASE = "https://raw.githubusercontent.com/GDman83/g-school/main/";

        // 🚪 開啟特定宇宙分流
        function launchUniverse(fileName, titleText) {
            document.getElementById('hubUniverse').classList.add('hidden');
            document.getElementById('appUniverse').classList.remove('hidden');
            document.getElementById('btnBackToHub').classList.remove('hidden');
            document.getElementById('hubTitle').querySelector('h1').innerText = titleText;
            
            // 🚚 現場搬運指定 .md 房間
            fetch(GITHUB_RAW_BASE + fileName)
                .then(res => res.text())
                .then(markdown => {
                    parseMarkdownData(markdown);
                    currentIndex = 0;
                    renderCard();
                })
                .catch(err => {
                    alert("城堡連線失敗，請檢查網路！" + err);
                });
        }

        // 🔙 安全返回大廳
        document.getElementById('btnBackToHub').addEventListener('click', () => {
            document.getElementById('hubUniverse').classList.remove('hidden');
            document.getElementById('appUniverse').classList.add('hidden');
            document.getElementById('btnBackToHub').classList.add('hidden');
            document.getElementById('hubTitle').querySelector('h1').innerText = "啟盟學堂";
        });

        // 📐 解析 Markdown 鐵軌表格大腦
        function parseMarkdownData(md) {
            currentDatabase = [];
            const lines = md.split('\n');
            for(let i=0; i<lines.length; i++) {
                const line = lines[i].trim();
                if(!line.startsWith('|') || line.includes(':---') || line.includes('主要展示')) continue;
                
                const cells = line.split('|').map(c => c.trim());
                if(cells.length < 8) continue; // 欄位安全檢測
                
                currentDatabase.push({
                    id: cells[1],
                    main: cells[2],
                    sub: cells[3],
                    pinyin: cells[4], // 用於注音符號的獨立拼音
                    example: cells[5],
                    vn: cells[6],
                    imgCode: cells[7]  // 圖形提示欄位碼
                });
            }
        }

        // 🎴 渲染大卡片數據
        function renderCard() {
            if(currentDatabase.length === 0) return;
            const item = currentDatabase[currentIndex];
            
            document.getElementById('cardId').innerText = `# ${item.id}`;
            document.getElementById('cardMain').innerText = item.main;
            document.getElementById('txtCounter').innerText = `${currentIndex + 1} / ${currentDatabase.length}`;
            
            // 🧠 智慧判斷：如果是注音單元，將獨立拼音顯示在上方提示區
            if(item.id.startsWith('ㄅ') && item.pinyin) {
                document.getElementById('cardSub').innerText = item.pinyin;
                document.getElementById('cardSub').classList.remove('hidden');
            } else if(item.sub) {
                document.getElementById('cardSub').innerText = item.sub;
                document.getElementById('cardSub').classList.remove('hidden');
            } else {
                document.getElementById('cardSub').classList.add('hidden');
            }

            // 🗺️ 例句與越南文展示
            if(!item.example) {
                document.getElementById('sentenceBox').classList.add('hidden');
            } else {
                document.getElementById('sentenceBox').classList.remove('hidden');
                document.getElementById('cardExample').innerText = item.example;
                document.getElementById('cardVN').innerText = item.vn || "";
            }

            // 🖼️ 智慧圖形提示對齊
            const imgContainer = document.getElementById('imgContainer');
            const cardImg = document.getElementById('cardImg');
            if(item.imgCode && item.imgCode.match(/\.(jpeg|jpg|gif|png)/i)) {
                cardImg.src = item.imgCode;
                imgContainer.classList.remove('hidden');
            } else {
                imgContainer.classList.add('hidden');
            }
        }

        // 🎮 前後導航切換
        function navigateCard(direction) {
            currentIndex += direction;
            if(currentIndex < 0) currentIndex = currentDatabase.length - 1;
            if(currentIndex >= currentDatabase.length) currentIndex = 0;
            renderCard();
        }

        // 🗣️ 終極大核心：呼叫本機原廠最標準台灣腔中文女聲引擎
        function speakCurrentText(type) {
            if(currentDatabase.length === 0) return;
            const item = currentDatabase[currentIndex];
            let textToSpeak = "";

            if (type === 'main') {
                textToSpeak = item.main;
            } else {
                // 清洗例句中的英文與括號，確保發音純淨
                textToSpeak = item.example.split('\n')[0].split('(')[0].replace(/[a-zA-Z]/g, "").trim();
            }

            if (!textToSpeak) return;

            // 🚀 啟動 Web Speech 語音火箭
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            
            // 🎯 強制指定台灣腔標準發音（zh-TW）
            utterance.lang = "zh-TW";
            utterance.rate = 0.85; // 速度微微放慢，最適合小朋友學習！
            utterance.pitch = 1.0;

            // 🔍 尋找本機內建的最優質台灣腔女聲（如 Apple Mei-Jia 或 Google 台灣女聲）
            const voices = window.speechSynthesis.getVoices();
            const twVoice = voices.find(v => v.lang === "zh-TW" || v.lang === "zh_TW");
            if(twVoice) utterance.voice = twVoice;

            // 如果本機正在發音，先中斷，避免串音
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        // 📱 解決部分手機瀏覽器語音快取延遲問題
        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
            window.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }
    </script>
</body>
</html>
