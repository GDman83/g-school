<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G學園 - 中文啟盟學堂</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Poppins:wght@600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC05;
            --google-green: #34A853;
            --text-main: #0F172A;
            --text-muted: #475569;
            --bg-app: #F8FAFC;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #CBD5E1; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .phone-container { width: 100%; max-width: 414px; height: 100vh; max-height: 850px; background-color: var(--bg-app); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        @media (min-width: 450px) { .phone-container { height: 820px; border: 12px solid #1E293B; border-radius: 40px; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.4); } }
        
        /* 儀式感首頁大門 */
        #welcome-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(135deg, #4285F4, #34A853); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; transition: all 0.5s ease; }
        .school-gate-icon { font-size: 80px; margin-bottom: 20px; animation: bounce 2s infinite; }
        .welcome-title { font-size: 28px; font-weight: 900; margin-bottom: 8px; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.15); }
        .welcome-subtitle { font-size: 14px; opacity: 0.9; margin-bottom: 40px; }
        .enter-btn { background: #FFFFFF; color: var(--google-blue); padding: 16px 40px; border-radius: 30px; font-size: 18px; font-weight: 700; border: none; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: transform 0.2s; }
        .enter-btn:active { transform: scale(0.95); }

        .app-header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; background: #FFFFFF; border-bottom: 1px solid #E2E8F0; height: 65px; }
        .app-title { font-weight: 900; color: var(--google-blue); font-size: 20px; }
        .counter { background: #EEF2F6; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 700; color: var(--google-blue); font-family: 'Poppins', sans-serif; }
        
        /* 卡片與骨架鎖死 - 防止任何跳動 */
        .card-area { flex: 1; padding: 16px 20px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .study-card { background: white; border-radius: 32px; padding: 20px; box-shadow: 0 10px 30px rgba(15,23,42,0.04); display: flex; flex-direction: column; position: relative; height: 480px; box-sizing: border-box; }
        
        /* 右上角獨立朗讀單詞小喇叭 */
        .audio-trigger-btn { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; background: #EEF2F6; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--google-blue); font-size: 15px; z-index: 10; }
        
        /* 左上角縮小挪開的序號 */
        .card-id { position: absolute; top: 16px; left: 24px; font-family: 'Poppins', sans-serif; font-size: 24px; font-weight: 900; color: #94A3B8; }
        
        /* 核心單詞與拼音區：高度固定 */
        .word-main-zone { height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-top: 25px; text-align: center; }
        .pinyin-text { font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 600; color: var(--google-red); margin-bottom: 4px; }
        
        /* 支援4個字成語，超過3字自動縮小字體防止擠壓換行 */
        .main-word { font-size: 48px; font-weight: 900; color: var(--text-main); letter-spacing: -1px; line-height: 1.2; max-width: 100%; display: block; white-space: nowrap; }
        .main-word.long-word { font-size: 36px; } 
        
        /* 綠色注音完美移到單詞正下方 */
        .zhuyin-text { font-size: 15px; font-weight: 700; color: var(--google-green); margin-top: 6px; min-height: 22px; text-align: center; }
        
        .hint-badge { display: flex; justify-content: center; margin-bottom: 12px; height: 32px; align-items: center; }
        .hint-tag { background: #F1F5F9; color: var(--text-muted); padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; }
        .divider { height: 1px; background: #F1F5F9; margin-bottom: 16px; }
        
        /* 例句顯示區域：高度鎖死 */
        .sentence-section { display: flex; flex-direction: column; gap: 10px; height: 160px; justify-content: center; }
        .target-sentence { font-size: 20px; font-weight: 700; color: var(--google-blue); text-align: center; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .translation-box { background: #F8FAFC; border-radius: 16px; padding: 10px 14px; border: 1px solid #F1F5F9; height: 68px; display: flex; align-items: center; justify-content: center; }
        .translation-sentence { font-size: 14px; color: var(--text-muted); text-align: center; line-height: 1.4; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* 底部導航欄高度固定，消除跳動 */
        .nav-bar { padding: 15px 24px 25px; display: flex; gap: 16px; background: white; border-top: 1px solid #E2E8F0; height: 95px; box-sizing: border-box; }
        .nav-btn { flex: 1; height: 54px; border-radius: 24px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: background 0.2s; }
        .btn-prev { background: #F1F5F9; color: var(--text-main); }
        .btn-next { background: var(--google-blue); color: white; box-shadow: 0 8px 20px rgba(66, 133, 244, 0.3); }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-15px); } 60% { transform: translateY(-7px); } }
    </style>
</head>
<body>

    <div class="phone-container">
        <div id="welcome-overlay">
            <div class="school-gate-icon">🏛️</div>
            <div class="welcome-title">G學園啟盟學堂</div>
            <div class="welcome-subtitle">歡迎校長蒞臨視導</div>
            <button class="enter-btn" onclick="enterSchool()">開啟學堂大門</button>
        </div>

        <div class="app-header">
            <div class="app-title"><i class="fas fa-graduation-cap"></i> G-School</div>
            <div id="card-counter" class="counter">0 / 0</div>
        </div>

        <div class="card-area">
            <div class="study-card">
                <button class="audio-trigger-btn" onclick="playWordAudio()"><i class="fas fa-volume-up"></i></button>
                
                <span id="lbl-id" class="card-id">--</span>

                <div class="word-main-zone">
                    <span id="lbl-pinyin" class="pinyin-text">--</span>
                    <div id="lbl-word" class="main-word">--</div>
                    <div id="lbl-zhuyin" class="zhuyin-text">--</div>
                </div>
                
                <div class="hint-badge"><div id="lbl-hint" class="hint-tag">提示: --</div></div>
                <div class="divider"></div>
                
                <div class="sentence-section">
                    <div id="lbl-sentence-zh" class="target-sentence">--</div>
                    <div class="translation-box">
                        <div id="lbl-sentence-vi" class="translation-sentence">--</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="nav-bar">
            <button class="nav-btn btn-prev" onclick="prevCard()"><i class="fas fa-arrow-left"></i> 上一字</button>
            <button class="nav-btn btn-next" onclick="nextCard()">下一字 <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <script>
        let db = [];
        let currentIndex = 0;
        let audioCtx = null;

        // 儀式感：進入學堂並敲鐘
        function enterSchool() {
            document.getElementById("welcome-overlay").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("welcome-overlay").style.display = "none";
            }, 500);
            
            // 播放模擬實體學校上課打鐘聲
            playSchoolBell();
            // 延時朗讀第一首例句
            setTimeout(() => { playSentenceAudio(); }, 1200);
        }

        // 用 Web Audio API 純代碼合成清脆的學校電子鐘聲 (不需加載音檔)
        function playSchoolBell() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const playTone = (startTime, frequency, duration) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(frequency, startTime);
                    gain.gain.setValueAtTime(0.3, startTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(startTime);
                    osc.stop(startTime + duration);
                };
                
                // 經典學校上課四音節鐘聲 (噹～噹～噹～噹～)
                let now = audioCtx.currentTime;
                playTone(now, 523.25, 1.0);       // C5
                playTone(now + 0.6, 659.25, 1.0); // E5
                playTone(now + 1.2, 587.33, 1.0); // D5
                playTone(now + 1.8, 392.00, 1.4); // G4
            } catch(e) { console.log("音訊環境啟動失敗", e); }
        }

        async function loadCardsFromMD() {
            try {
                const response = await fetch(`./data.md?v=${Date.now()}`);
                const text = await response.text();
                const lines = text.split('\n');
                let tempDb = [];
                
                lines.forEach(line => {
                    if (line.includes('|')) {
                        const cols = line.split('|').map(c => c.trim());
                        if (cols.length >= 7 && cols[1] && !cols[1].includes('---') && !cols[1].includes('編號')) {
                            tempDb.push({
                                id: cols[1], word: cols[2], pinyin: cols[3], zhuyin: cols[4], sentence_zh: cols[5], sentence_vi: cols[6]
                            });
                        }
                    }
                });

                if(tempDb.length > 0) { db = tempDb; renderCard(); }
            } catch (error) { console.error("讀取失敗：", error); }
        }

        function renderCard() {
            if(db.length === 0) return;
            const current = db[currentIndex];
            
            document.getElementById("lbl-id").textContent = current.id || "";
            
            // 處理成語等長單詞的字體大小彈性縮放，避免擠壓換行
            const wordEl = document.getElementById("lbl-word");
            wordEl.textContent = current.word || "--";
            if (current.word && current.word.length >= 4) {
                wordEl.classList.add("long-word");
            } else {
                wordEl.classList.remove("long-word");
            }

            document.getElementById("lbl-pinyin").textContent = current.pinyin || "";
            document.getElementById("lbl-zhuyin").textContent = current.zhuyin || "--";
            document.getElementById("lbl-hint").textContent = `提示: ${current.word || "--"}`;
            document.getElementById("lbl-sentence-zh").textContent = current.sentence_zh || "--";
            document.getElementById("lbl-sentence-vi").textContent = current.sentence_vi || "--";
            
            document.getElementById("card-counter").textContent = `${currentIndex + 1} / ${db.length}`;
        }

        function nextCard() { if (currentIndex < db.length - 1) { currentIndex++; renderCard(); playSentenceAudio(); } }
        function prevCard() { if (currentIndex > 0) { currentIndex--; renderCard(); playSentenceAudio(); } }

        // 應用分開 1：按按鈕或切換時，只朗讀「中文例句」
        function playSentenceAudio() {
            if(db.length === 0 || !('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const current = db[currentIndex];
            if (!current.sentence_zh) return;
            
            const utterance = new SpeechSynthesisUtterance(current.sentence_zh);
            utterance.lang = 'zh-TW';
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        }

        // 應用分開 2：點右上角小喇叭時，單獨精準朗讀「單詞」
        function playWordAudio() {
            if(db.length === 0 || !('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const current = db[currentIndex];
            
            const utterance = new SpeechSynthesisUtterance(current.word);
            utterance.lang = 'zh-TW';
            utterance.rate = 0.75; // 單詞稍微慢一點讓學生聽得更準
            window.speechSynthesis.speak(utterance);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
            });
        }

        window.addEventListener('DOMContentLoaded', loadCardsFromMD);
    </script>
</body>
</html>
