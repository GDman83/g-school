<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎒 啟盟學堂智慧字卡 HUB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
    .ruby-container ruby { ruby-position: over; font-variant-east-asian: ruby; }
    .ruby-container rt { font-size: 0.38em; color: #db2777; font-weight: 900; letter-spacing: 1px; padding-bottom: 2px; }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <header class="bg-gradient-to-r from-indigo-600 to-blue-700 text-white shadow-lg p-4 sticky top-0 z-50">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <div class="flex items-center cursor-pointer" onclick="showMenu()">
        <i class="fa-solid fa-house-chimney mr-3 text-xl"></i>
        <h1 class="text-xl font-black tracking-wider">啟盟學堂</h1>
      </div>
      <span id="counter" class="bg-white/20 text-white text-xs font-bold px-3 py-1 rounded-full border border-white/30">
        學堂運作中
      </span>
    </div>
  </header>

  <div id="unit-menu" class="flex-grow flex flex-col items-center justify-center p-6 space-y-8">
    <div class="text-center space-y-2">
      <h2 class="text-3xl font-black text-slate-800">今天要學什麼呢？</h2>
      <p class="text-slate-500 font-medium tracking-widest">請選擇一個學習單元</p>
    </div>

    <div class="w-full max-w-sm space-y-4">
      <button onclick="openSubMenu('core')" class="w-full bg-white p-6 rounded-3xl shadow-xl border-b-8 border-indigo-200 active:border-b-0 active:translate-y-2 transition-all flex items-center group">
        <div class="w-16 h-16 rounded-2xl bg-indigo-100 flex items-center justify-center text-3xl mr-5 group-hover:scale-110 transition-transform">🌟</div>
        <div class="text-left">
          <h3 class="text-xl font-black text-slate-800">核心識字學堂</h3>
          <p class="text-slate-400 text-sm">按常規英文編號探索</p>
        </div>
      </button>

      <button onclick="openSubMenu('zhuyin')" class="w-full bg-white p-6 rounded-3xl shadow-xl border-b-8 border-amber-200 active:border-b-0 active:translate-y-2 transition-all flex items-center group">
        <div class="w-16 h-16 rounded-2xl bg-amber-100 flex items-center justify-center text-3xl mr-5 group-hover:scale-110 transition-transform">ㄅ</div>
        <div class="text-left">
          <h3 class="text-xl font-black text-slate-800">注音符號學堂</h3>
          <p class="text-slate-400 text-sm">37注音獨立切片小宇宙</p>
        </div>
      </button>
    </div>
  </div>

  <div id="sub-menu" class="hidden flex-grow flex flex-col items-center p-6 space-y-6 max-w-md mx-auto w-full">
    <div class="flex items-center justify-between w-full">
      <button onclick="showMenu()" class="text-slate-400 hover:text-slate-600 font-bold"><i class="fa-solid fa-arrow-left mr-1"></i> 返回主選單</button>
      <h2 id="sub-menu-title" class="text-xl font-black text-slate-700">選擇分類</h2>
    </div>
    
    <div id="core-buttons" class="w-full space-y-3 hidden">
      <button onclick="loadJsonData('data_A')" class="w-full bg-indigo-500 text-white p-4 rounded-2xl font-bold text-lg shadow hover:bg-indigo-600 transition-colors">A 區 貨櫃庫</button>
      <button onclick="loadJsonData('data_F')" class="w-full bg-emerald-500 text-white p-4 rounded-2xl font-bold text-lg shadow hover:bg-emerald-600 transition-colors">F 區 貨櫃庫</button>
      <button onclick="loadJsonData('data_K')" class="w-full bg-amber-500 text-white p-4 rounded-2xl font-bold text-lg shadow hover:bg-amber-600 transition-colors">K 區 貨櫃庫</button>
      <button onclick="loadJsonData('data_T')" class="w-full bg-rose-500 text-white p-4 rounded-2xl font-bold text-lg shadow hover:bg-rose-600 transition-colors">T 區 貨櫃庫</button>
    </div>

    <div id="zhuyin-grid" class="grid grid-cols-5 gap-3 w-full hidden">
      </div>
  </div>

  <main id="card-viewer" class="hidden flex-grow flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl border border-white p-6 space-y-6 relative overflow-hidden">
      
      <div class="flex justify-between items-center">
        <button onclick="backToSubMenu()" class="text-slate-300 hover:text-slate-500 transition-colors"><i class="fa-solid fa-circle-arrow-left text-2xl"></i></button>
        <span id="card-id" class="text-slate-400 font-black text-lg tracking-widest italic">#00</span>
        <button onclick="playAudio('main')" class="w-14 h-14 rounded-full bg-pink-500 text-white flex items-center justify-center shadow-lg active:scale-90 transition-all focus:outline-none">
          <i class="fa-solid fa-volume-high text-2xl"></i>
        </button>
      </div>

      <div class="flex flex-col items-center justify-center py-2 space-y-2">
        <div id="main-word-box" class="ruby-container text-7xl font-black text-slate-800 text-center leading-none"></div>
        <div id="sub-tip" class="text-slate-400 text-lg font-bold tracking-widest pt-2 text-center"></div>
      </div>

      <div class="flex justify-center items-center p-4 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 min-h-[160px]">
        <div id="image-display" class="text-8xl select-none drop-shadow-xl">🎒</div>
      </div>

      <div class="bg-indigo-50 rounded-3xl p-5 relative border border-indigo-100">
        <button onclick="playAudio('sentence')" class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white text-indigo-600 flex items-center justify-center shadow-md active:scale-90 focus:outline-none">
          <i class="fa-solid fa-volume-high"></i>
        </button>
        <div class="space-y-4 pr-8">
          <div id="example-sentence" class="text-2xl font-bold text-slate-800 leading-normal"></div>
          <p id="vietnamese-translation" class="text-indigo-500 font-bold text-lg italic border-t border-indigo-200 pt-3"></p>
        </div>
      </div>

    </div>
  </main>

  <footer id="card-footer" class="hidden bg-white border-t border-slate-200 p-6 sticky bottom-0 z-50">
    <div class="max-w-md mx-auto space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <button onclick="navigateCard(-1)" class="py-5 bg-slate-100 text-slate-600 font-black text-xl rounded-2xl active:scale-95 flex items-center justify-center transition-all">
          <i class="fa-solid fa-chevron-left mr-2"></i> 上一頁
        </button>
        <button onclick="navigateCard(1)" class="py-5 bg-indigo-600 text-white font-black text-xl rounded-2xl shadow-xl active:scale-95 flex items-center justify-center transition-all">
          下一頁 <i class="fa-solid fa-chevron-right ml-2"></i>
        </button>
      </div>
      <div class="grid grid-cols-2 gap-8 text-sm font-black text-slate-400 px-2">
        <button onclick="navigateCard(-10)" class="text-left hover:text-slate-600 active:scale-90 transition-all focus:outline-none uppercase tracking-tighter">
          <i class="fa-solid fa-rules mr-1"></i> 快退 10 筆
        </button>
        <button onclick="navigateCard(10)" class="text-right hover:text-slate-600 active:scale-90 transition-all focus:outline-none uppercase tracking-tighter">
          快進 10 筆 <i class="fa-solid fa-angles-right ml-1"></i>
        </button>
      </div>
    </div>
  </footer>

  <script>
    let currentFilteredData = [];
    let currentIndex = 0;
    let currentAudio = null;
    let currentUnitMode = 'core';

    const zhuyinList = [
      "ㄅ","ㄆ","ㄇ","ㄈ","ㄉ","ㄊ","ㄋ","ㄌ","ㄍ","ㄎ","ㄏ",
      "ㄐ","ㄑ","ㄒ","ㄓ","ㄔ","ㄕ","ㄖ","ㄗ","ㄘ","ㄙ",
      "ㄚ","ㄛ","ㄜ","ㄝ","ㄞ","ㄟ","ㄠ","ㄡ","ㄢ","ㄣ","ㄤ","ㄥ","ㄦ",
      "ㄧ","ㄨ","ㄩ"
    ];

    // 初始化動態渲染37注音鍵盤
    function initZhuyinMenu() {
      const grid = document.getElementById('zhuyin-grid');
      grid.innerHTML = '';
      zhuyinList.forEach(zy => {
        const btn = document.createElement('button');
        btn.className = "bg-amber-100 hover:bg-amber-200 text-amber-800 font-black py-3 rounded-xl text-xl shadow-sm active:scale-95 transition-all";
        btn.innerText = zy;
        btn.onclick = () => loadJsonData(`data_${zy}`);
        grid.appendChild(btn);
      });
    }

    function showMenu() {
      document.getElementById('unit-menu').classList.remove('hidden');
      document.getElementById('sub-menu').classList.add('hidden');
      document.getElementById('card-viewer').classList.add('hidden');
      document.getElementById('card-footer').classList.add('hidden');
    }

    function openSubMenu(mode) {
      currentUnitMode = mode;
      document.getElementById('unit-menu').classList.add('hidden');
      document.getElementById('sub-menu').classList.remove('hidden');
      
      const title = document.getElementById('sub-menu-title');
      const coreBox = document.getElementById('core-buttons');
      const zyGrid = document.getElementById('zhuyin-grid');

      if (mode === 'core') {
        title.innerText = "🌟 選擇核心貨櫃單元";
        coreBox.classList.remove('hidden');
        zyGrid.classList.add('hidden');
      } else {
        title.innerText = "ㄅ 選擇注音符號單元";
        coreBox.classList.add('hidden');
        zyGrid.classList.remove('hidden');
      }
    }

    function backToSubMenu() {
      document.getElementById('card-viewer').classList.add('hidden');
      document.getElementById('card-footer').classList.add('hidden');
      document.getElementById('sub-menu').classList.remove('hidden');
      if (currentAudio) currentAudio.pause();
    }

    // 🎯 核心調度：免除舊版大總表，直攻 GitHub 倉庫分區小檔案！
    async function loadJsonData(fileName) {
      document.getElementById('counter').innerText = "載入中...";
      try {
        // 直接異步讀取 GitHub data/ 資料夾下的對應切片檔案
        const response = await fetch(`data/${fileName}.json`);
        if (!response.ok) throw new Error("無此檔案");
        
        currentFilteredData = await response.json();
        
        if (currentFilteredData.length === 0) {
          alert("此分區貨櫃目前沒有資料！");
          return;
        }

        document.getElementById('sub-menu').classList.add('hidden');
        document.getElementById('card-viewer').classList.remove('hidden');
        document.getElementById('card-footer').classList.remove('hidden');
        renderCard(0);
      } catch (err) {
        alert(`❌ 提貨失敗：找不到 [data/${fileName}.json] 檔案！請先在 Excel 內填入該資料並按同步！`);
        document.getElementById('counter').innerText = "等候提貨";
      }
    }

    function renderCard(index) {
      currentIndex = index;
      const card = currentFilteredData[index];
      
      document.getElementById('counter').innerText = `${currentIndex + 1} / ${currentFilteredData.length}`;
      document.getElementById('card-id').innerText = `# ${card.id}`;
      document.getElementById('sub-tip').innerText = card.pinyin ? card.pinyin : "";
      
      // 渲染主詞彙與注音對齊
      document.getElementById('main-word-box').innerHTML = buildRubyString(card.word, card.zhuyin);
      
      // 渲染 Emoji
      document.getElementById('image-display').innerText = card.imgCode ? card.imgCode : "🎒";
      
      // 渲染生活例句與越南文
      document.getElementById('example-sentence').innerText = card.example ? card.example : "";
      document.getElementById('vietnamese-translation').innerText = card.vietnamese ? card.vietnamese : "";
    }

    function buildRubyString(word, zhuyin) {
      if (!zhuyin || zhuyin === "-") return word;
      const charArray = word.split('');
      const zhuyinArray = zhuyin.includes(' ') ? zhuyin.split(' ') : zhuyin.split(',');
      if (charArray.length === zhuyinArray.length) {
        return charArray.map((char, i) => `<ruby>${char}<rt>${zhuyinArray[i]}</rt></ruby>`).join('');
      }
      return `<ruby>${word}<rt>${zhuyin}</rt></ruby>`;
    }

    function playAudio(type) {
      const card = currentFilteredData[currentIndex];
      if (currentAudio) currentAudio.pause();
      
      const audioPath = type === 'main' ? card.mainAudio : card.sentenceAudio;
      if (!audioPath) {
        alert("🔊 抱歉！此單詞未成功生成語音。");
        return;
      }
      
      currentAudio = new Audio(audioPath);
      currentAudio.play().catch(e => alert("🚨 語音檔案讀取斷流，請檢查網頁連線狀態！"));
    }

    function navigateCard(step) {
      let nextIndex = currentIndex + step;
      if (nextIndex < 0) nextIndex = 0;
      if (nextIndex >= currentFilteredData.length) nextIndex = currentFilteredData.length - 1;
      renderCard(nextIndex);
    }

    // 網頁加載完畢立刻初始化注音面板
    window.onload = () => {
      initZhuyinMenu();
      showMenu();
    };
  </script>
</body>
</html>
