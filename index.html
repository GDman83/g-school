<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G學園 - 中文啟盟學堂</title>
    
    <link rel="manifest" href="/g-school/manifest.json">
    <meta name="theme-color" content="#536DFE">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="G學園">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2240/2240632.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC05;
            --google-green: #34A853;
            --text-main: #0F172A;
            --text-muted: #475569;
            --bg-app: #F8FAFC;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #CBD5E1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 手機模擬器外殼（PWA 打開時會全螢幕填滿） */
        .phone-container {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            max-height: 850px;
            background-color: var(--bg-app);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 450px) {
            .phone-container {
                height: 850px;
                border: 10px solid #1E293B;
                border-radius: 50px;
                box-shadow: 0 40px 100px -20px rgba(0,0,0,0.4);
            }
        }

        /* 歡迎首頁（敲鐘開課） */
        .start-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #536DFE 0%, #43A047 100%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .start-overlay.fade-out {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        .start-school-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        .start-title {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .start-subtitle {
            font-size: 15px;
            opacity: 0.85;
            margin-bottom: 40px;
        }

        .start-btn {
            background-color: white;
            color: #536DFE;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        /* 讀取與錯誤蓋板 */
        .status-overlay {
            position: absolute;
            inset: 0;
            background-color: var(--bg-app);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .hidden { display: none !important; }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #E2E8F0;
            border-top-color: var(--google-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .error-icon {
            font-size: 64px;
            color: var(--google-red);
            margin-bottom: 20px;
        }

        .status-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .status-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .retry-btn {
            background-color: #536DFE;
            color: white;
            padding: 14px 50px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(83,109,254,0.3);
        }

        /* 核心內容區域 */
        .app-header {
            padding: 20px;
            background-color: white;
            border-bottom: 1px solid #E2E8F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 900;
            color: #536DFE;
        }

        .counter-badge {
            background-color: #EDF2FE;
            color: #536DFE;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .card-zone {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 霸氣字卡本體 */
        .vocab-card {
            background-color: white;
            width: 100%;
            height: 100%;
            max-height: 480px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(15,23,42,0.08);
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .audio-trigger-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* 核心大字與注音組合 */
        .word-combo-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .main-word {
            font-size: 76px;
            font-weight: 900;
            color: var(--text-main);
            letter-spacing: -2px;
        }

        .zhuyin-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #EC4899;
            font-weight: 700;
            font-size: 20px;
            line-height: 1.2;
            border-left: 2px dashed #F472B6;
            padding-left: 8px;
        }

        .pinyin-text {
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 600;
            background-color: #F1F5F9;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        /* 越南文與例句區 */
        .translation-box {
            border-top: 1px solid #F1F5F9;
            padding-top: 20px;
            text-align: center;
        }

        .vietnamese-title {
            font-size: 24px;
            font-weight: 800;
            color: #059669;
            margin-bottom: 10px;
        }

        .example-sentence {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            background-color: #F8FAFC;
            padding: 12px;
            border-radius: 16px;
            font-weight: 500;
        }

        /* 喇叭絕對定位懸浮按鈕 */
        .speaker-floating-icon {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background-color: #EEF2F6;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #536DFE;
            font-size: 16px;
        }

        /* 底部控制導航欄 */
        .bottom-nav {
            padding: 20px;
            background-color: white;
            border-top: 1px solid #E2E8F0;
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            flex: 1;
            padding: 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .btn-prev { background-color: #F1F5F9; color: var(--text-main); }
        .btn-next { background-color: #536DFE; color: white; box-shadow: 0 8px 20px rgba(83,109,254,0.25); }
        .nav-btn:active { transform: scale(0.98); }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <div id="startOverlay" class="start-overlay">
            <div class="start-school-icon">🏫</div>
            <h1 class="start-title">G學園啟盟學堂</h1>
            <p class="start-subtitle">校長專屬 · 中越雙語卡片系統</p>
            <button class="start-btn" onclick="openSchool()">
                <i class="fas fa-bell"></i> 敲鐘開課
            </button>
        </div>

        <div id="loadingLayer" class="status-overlay">
            <div class="spinner"></div>
            <h2 class="status-title">正在讀取校內教材庫...</h2>
            <p class="status-desc">本機模式啟動，資料秒速加載中。</p>
        </div>

        <div id="errorLayer" class="status-overlay hidden">
            <div class="error-icon"><i class="fas fa-exclamation-circle"></i></div>
            <h2 class="status-title">本地教材讀取失敗</h2>
            <p class="status-desc">請確認您的倉庫內是否存在正確格式的 data.json 檔案。</p>
            <button class="retry-btn" onclick="fetchLibraryData()">重新讀取</button>
        </div>

        <div class="app-header">
            <div class="logo-text"><i class="fas fa-graduation-cap"></i> G-School</div>
            <div id="cardCounter" class="counter-badge">0 / 0</div>
        </div>

        <div class="card-zone">
            <div class="vocab-card">
                <div class="audio-trigger-zone" onclick="speakCurrentWord()">
                    <div class="speaker-floating-icon" id="speakerIcon">
                        <i class="fas fa-volume-up"></i>
                    </div>
                    
                    <div class="word-combo-box">
                        <div id="mainWord" class="main-word">--</div>
                        <div id="zhuyinBox" class="zhuyin-box"></div>
                    </div>
                    
                    <div id="pinyinText" class="pinyin-text">--</div>
                </div>

                <div class="translation-box">
                    <div id="vietnameseTitle" class="vietnamese-title">--</div>
                    <div id="exampleSentence" class="example-sentence">--</div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn btn-prev" onclick="prevCard()"><i class="fas fa-arrow-left"></i> 上一字</button>
            <button class="nav-btn btn-next" onclick="nextCard()">下一字 <i class="fas fa-arrow-right"></i></button>
        </div>

    </div>

    <audio id="globalAudioPlayer" preload="auto"></audio>

    <script>
        let dbData = [];
        let currentIndex = 0;

        function openSchool() {
            document.getElementById('startOverlay').classList.add('fade-out');
            fetchLibraryData();
        }

        // 🎯【極速本機加載】徹底捨棄 GAS 網址，直接讀取 GitHub 同目錄下的 data.json
        function fetchLibraryData() {
            document.getElementById('loadingLayer').classList.remove('hidden');
            document.getElementById('errorLayer').classList.add('hidden');

            // 加上時間戳記強制刷新防快取
            fetch('./data.json?t=' + new Date().getTime())
                .then(response => {
                    if (!response.ok) throw new Error('data.json 讀取失敗');
                    return response.json();
                })
                .then(data => {
                    if (data && data.length > 0) {
                        dbData = data;
                        currentIndex = 0;
                        renderCard();
                        document.getElementById('loadingLayer').classList.add('hidden');
                    } else {
                        throw new Error('教材資料為空');
                    }
                })
                .catch(err => {
                    console.error('PWA讀取錯誤:', err);
                    document.getElementById('loadingLayer').classList.add('hidden');
                    document.getElementById('errorLayer').classList.remove('hidden');
                });
        }

        function renderCard() {
            if (dbData.length === 0) return;
            const item = dbData[currentIndex];

            document.getElementById('mainWord').innerText = item["核心詞彙"] || "--";
            document.getElementById('pinyinText').innerText = item["拼音 / 提示"] || "";
            document.getElementById('vietnameseTitle').innerText = item["生活語言(越南-VN)"] || "--";
            document.getElementById('exampleSentence').innerText = item["生活應用例句 (點擊可朗讀)"] || "";
            
            document.getElementById('cardCounter').innerText = `${currentIndex + 1} / ${dbData.length}`;

            // 處理注音符號垂直排列
            const zhuyinRaw = item["注音"] || "";
            const zhuyinBox = document.getElementById('zhuyinBox');
            zhuyinBox.innerHTML = "";
            
            if (zhuyinRaw) {
                const parts = zhuyinRaw.split(' ');
                parts.forEach(part => {
                    const div = document.createElement('div');
                    div.innerText = part;
                    zhuyinBox.appendChild(div);
                });
            }
        }

        function nextCard() {
            if (dbData.length === 0) return;
            currentIndex = (currentIndex + 1) % dbData.length;
            renderCard();
        }

        function prevCard() {
            if (dbData.length === 0) return;
            currentIndex = (currentIndex - 1 + dbData.length) % dbData.length;
            renderCard();
        }

        function speakCurrentWord() {
            if (dbData.length === 0) return;
            const word = dbData[currentIndex]["核心詞彙"];
            if (!word) return;

            const player = document.getElementById('globalAudioPlayer');
            player.src = `https://translate.google.com/translate_tts?ie=UTF-8&tl=zh-TW&client=tw-ob&q=${encodeURIComponent(word)}`;
            
            const speaker = document.getElementById('speakerIcon');
            speaker.style.color = '#EA4335';
            player.play();
            
            player.onended = () => { speaker.style.color = '#536DFE'; };
        }

        // 註冊 PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/g-school/sw.js')
                    .then(reg => console.log('G學園 PWA 註冊成功！', reg.scope))
                    .catch(err => console.log('PWA 註冊失敗:', err));
            });
        }
    </script>
</body>
</html>
