<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G學園 - 啟盟魔法學堂</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Poppins:wght@600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="./emojis.js"></script>
    <style>
        :root { --google-blue: #4285F4; --google-red: #EA4335; --google-yellow: #FBBC05; --google-green: #34A853; --text-main: #0F172A; --text-muted: #475569; --bg-app: #F8FAFC; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #CBD5E1; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .phone-container { width: 100%; max-width: 414px; height: 100vh; max-height: 850px; background-color: var(--bg-app); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        @media (min-width: 450px) { .phone-container { height: 820px; border: 12px solid #1E293B; border-radius: 40px; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.4); } }
        
        /* 🏛️ 城堡大門選單 */
        #welcome-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(135deg, #1E3A8A, #3B82F6); z-index: 999; display: flex; flex-direction: column; padding: 30px 24px; color: white; transition: all 0.3s ease; overflow-y: auto; }
        .school-header { text-align: center; margin-top: 15px; margin-bottom: 25px; }
        .school-logo { font-size: 60px; margin-bottom: 10px; display: inline-block; }
        .welcome-title { font-size: 26px; font-weight: 900; letter-spacing: 1px; }
        .menu-section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; color: #93C5FD; display: flex; align-items: center; gap: 6px; }
        .menu-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .portal-card { background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.15); border-radius: 24px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: 0.2s; }
        .portal-card:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.25); }
        .portal-icon { font-size: 32px; width: 55px; height: 55px; border-radius: 16px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.2); }
        .portal-name { font-size: 17px; font-weight: 900; color: white; }
        .portal-desc { font-size: 12px; color: #BFDBFE; }
        
        /* 學習主畫面 */
        .app-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: white; border-bottom: 1px solid #E2E8F0; }
        .back-to-gate-btn { background: #F1F5F9; border: none; padding: 8px 12px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 13px; }
        .counter { background: #EEF2F6; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 700; color: var(--google-blue); }

        .card-area { flex: 1; padding: 10px 20px; display: flex; flex-direction: column; justify-content: center; }
        .study-card { background: white; border-radius: 32px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; position: relative; height: 560px; }
        .card-id { position: absolute; top: 16px; left: 24px; font-family: 'Poppins'; font-weight: 900; color: #CBD5E1; background: #F8FAFC; padding: 2px 10px; border-radius: 8px; }
        
        /* 1. 頂部圖形區 */
        .graphic-display-zone { height: 110px; display: flex; justify-content: center; align-items: center; margin-top: 5px; }
        .emoji-style { font-size: 90px; }
        .svg-container { width: 100px; height: 100px; }

        /* 2. 上方/輔助文字區 (詞彙或拼音展示) */
        .word-main-zone { height: 45px; display: flex; justify-content: center; align-items: center; text-align: center; }
        .main-word { font-size: 26px; font-weight: 900; color: var(--text-muted); }

        /* 🎯 3. 大展示盒 */
        .zhuyin-display-zone { height: 145px; display: flex; justify-content: center; align-items: center; background: #FFF7ED; border-radius: 24px; margin: 5px 0; border: 2px dashed #FED7AA; position: relative; }
        .zhuyin-large-char { font-size: 90px; font-weight: 950; color: var(--google-red); text-align: center; line-height: 1; }
        .word-audio-btn { width: 46px; height: 46px; border-radius: 50%; border: none; background: var(--google-red); color: white; cursor: pointer; font-size: 18px; box-shadow: 0 4px 10px rgba(234,67,53,0.3); margin-left: 15px; }

        /* 🎯 4. 新增：獨立出來的拼音學習欄位 (如：ㄅㄚˋ ㄅㄚ˙) */
        .pinyin-spelling-zone { height: 45px; display: flex; justify-content: center; align-items: center; text-align: center; margin-bottom: 5px; }
        .pinyin-spelling-text { font-size: 32px; font-weight: 900; color: var(--google-green); letter-spacing: 2px; }

        /* 5. 底部例句/複讀加深音區 */
        .sentence-section { height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; }
        .target-sentence { font-size: 22px; font-weight: 900; color: var(--text-main); }
        .sentence-audio-btn { width: 42px; height: 42px; border-radius: 50%; border: none; background: var(--google-blue); color: white; cursor: pointer; box-shadow: 0 4px 10px rgba(66,133,244,0.3); }

        /* 下方導航 */
        .nav-control-block { background: white; padding: 15px 20px 30px; display: flex; flex-direction: column; gap: 10px; }
        .nav-row { display: flex; gap: 10px; }
        .nav-btn { flex: 1; height: 50px; border-radius: 15px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-prev { background: #E2E8F0; }
        .btn-next { background: var(--google-blue); color: white; }
        .btn-jump { background: #F8FAFC; border: 1px solid #E2E8F0; font-size: 12px; height: 40px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="phone-container">
        <div id="welcome-overlay">
            <div class="school-header">
                <div class="school-logo">🏰</div>
                <div class="welcome-title">G學園啟盟學堂</div>
                <div class="welcome-subtitle">請校長與寶貝選擇魔法傳送門</div>
            </div>
            <div class="menu-section-title"><i class="fas fa-shapes"></i> 基礎語感奠基</div>
            <div class="menu-grid">
                <div class="portal-card" onclick="enterDepartment('zhuyin')" style="border-color:#FBBC05">
                    <div class="portal-icon" style="color:#FBBC05">ㄅ</div>
                    <div class="portal-info">
                        <div class="portal-name">ㄅㄆㄇ啟蒙幼兒園</div>
                        <div class="portal-desc">37個正宗注音符號與極簡音感複讀</div>
                    </div>
                </div>
            </div>
            <div class="menu-section-title"><i class="fas fa-graduation-cap"></i> 核心詞彙世界</div>
            <div class="menu-grid">
                <div class="portal-card" onclick="enterDepartment('c100')">
                    <div class="portal-icon" style="color:#4285F4">🌱</div>
                    <div class="portal-info"><div class="portal-name">初階核心 100 字</div><div class="portal-desc">編號 001~100 生活必學</div></div>
                </div>
                <div class="portal-card" onclick="enterDepartment('c200')">
                    <div class="portal-icon" style="color:#34A853">🌿</div>
                    <div class="portal-info"><div class="portal-name">初階核心 200 字</div><div class="portal-desc">編號 101~200 詞彙量提升</div></div>
                </div>
            </div>
        </div>

        <div class="app-header">
            <button class="back-to-gate-btn" onclick="backToGate()"><i class="fas fa-door-open"></i> 回大門</button>
            <div id="dept-title" style="font-weight:900">--</div>
            <div id="card-counter" class="counter">0/0</div>
        </div>

        <div class="card-area">
            <div class="study-card">
                <span id="lbl-id" class="card-id">--</span>
                <div id="graphic-zone" class="graphic-display-zone"></div>
                
                <div class="word-main-zone">
                    <div id="lbl-word" class="main-word">--</div>
                </div>

                <div class="zhuyin-display-zone">
                    <div id="lbl-large-zhuyin" class="zhuyin-large-char">--</div>
                    <button class="word-audio-btn" onclick="playAudio('word')"><i class="fas fa-volume-up"></i></button>
                </div>

                <div class="pinyin-spelling-zone">
                    <div id="lbl-spelling" class="pinyin-spelling-text">--</div>
                </div>

                <div class="sentence-section">
                    <div style="display:flex; align-items:center; gap:12px">
                        <div id="lbl-sentence-zh" class="target-sentence">--</div>
                        <button class="sentence-audio-btn" onclick="playAudio('sent')"><i class="fas fa-volume-up"></i></button>
                    </div>
                    <div id="lbl-sentence-vi" style="color:#64748B; font-size:14px; font-weight:700">--</div>
                </div>
            </div>
        </div>

        <div class="nav-control-block">
            <div class="nav-row">
                <button class="nav-btn btn-prev" onclick="prevCard()"><i class="fas fa-arrow-left"></i> 上一字</button>
                <button class="nav-btn btn-next" onclick="nextCard()">下一字 <i class="fas fa-arrow-right"></i></button>
            </div>
            <div class="nav-row">
                <button class="nav-btn btn-jump" onclick="jumpCards(-10)">退 10 字</button>
                <button class="nav-btn btn-jump" onclick="jumpCards(10)">進 10 字</button>
            </div>
        </div>
    </div>
    <audio id="audio-player"></audio>
    <script>
        let rawDb = [], filteredDb = [], currentIndex = 0, currentDept = '';
        const player = document.getElementById('audio-player');

        async function loadData() {
            const resp = await fetch(`./data.md?v=${Date.now()}`);
            const text = await resp.text();
            rawDb = text.split('\n').filter(l => l.includes('|')).map(l => {
                const c = l.split('|').map(s => s.trim());
                // 精准映射：c[1]=編號, c[2]=B欄, c[3]=C欄, c[4]=D欄, c[5]=E欄, c[6]=F欄, c[7]=H欄, c[8]=I欄, c[9]=J欄
                return { id:c[1], colB:c[2], colC:c[3], colD:c[4], colE:c[5], colF:c[6], colH:c[7], audioI:c[8], audioJ:c[9] };
            }).filter(o => o.id && !o.id.includes('---') && o.id !== '編號');
        }

        function enterDepartment(dept) {
            currentDept = dept;
            if (dept === 'zhuyin') filteredDb = rawDb.filter(o => o.id.includes('ㄅ'));
            else if (dept === 'c100') filteredDb = rawDb.filter(o => { let n = parseInt(o.id); return n >= 1 && n <= 100; });
            else if (dept === 'c200') filteredDb = rawDb.filter(o => { let n = parseInt(o.id); return n >= 101 && n <= 200; });
            
            currentIndex = parseInt(localStorage.getItem('G_PROG_'+dept)) || 0;
            document.getElementById('dept-title').innerText = (dept==='zhuyin'?'ㄅㄆㄇ啟蒙':'核心詞彙');
            document.getElementById('welcome-overlay').style.display = 'none';
            render(); playAudio('word');
        }

        function render() {
            if (!filteredDb[currentIndex]) return;
            const curr = filteredDb[currentIndex];
            document.getElementById('lbl-id').innerText = curr.id;
            
            // 圖形提示 (H欄優先，空則讀取庫)
            const gz = document.getElementById('graphic-zone');
            if (curr.colH.includes('<svg')) gz.innerHTML = `<div class="svg-container">${curr.colH}</div>`;
            else {
                let lookupKey = (currentDept === 'zhuyin') ? curr.colC : curr.colB;
                gz.innerHTML = `<span class="emoji-style">${curr.colH || (window.emojiDictionary?window.emojiDictionary[lookupKey]:'')}</span>`;
            }

            // 🎯 智慧相容渲染邏輯
            if (currentDept === 'zhuyin') {
                // 【注音園區】
                document.getElementById('lbl-word').innerText = `${curr.colC} ${curr.colB}`; // 上方顯示：爸爸 ㄅ
                document.getElementById('lbl-large-zhuyin').innerText = curr.colB;          // 大橘盒顯示：ㄅ
                document.getElementById('lbl-spelling').innerText = curr.colD;              // 拼音欄還原：ㄅㄚˋ ㄅㄚ˙ (亮綠色)
                document.getElementById('lbl-sentence-zh').innerText = curr.colE;          // 例句：爸爸 ㄅ
                document.getElementById('lbl-sentence-vi').innerText = curr.colF || "";     // 越南文
            } else {
                // 【核心詞彙區 100/200字】
                document.getElementById('lbl-word').innerText = curr.colC;                  // 上方顯示原本的拼音 (ㄋㄧˇ ㄏㄠˇ)
                document.getElementById('lbl-large-zhuyin').innerText = curr.colB;          // 大橘盒還原顯示中文字 (你好)
                document.getElementById('lbl-spelling').innerText = "";                     // 核心詞彙不需要下方拼音欄，留空
                document.getElementById('lbl-sentence-zh').innerText = curr.colE;          // 核心例句
                document.getElementById('lbl-sentence-vi').innerText = curr.colF || "";     // 核心翻譯
            }

            document.getElementById('card-counter').innerText = `${currentIndex+1}/${filteredDb.length}`;
            localStorage.setItem('G_PROG_'+currentDept, currentIndex);
        }

        function playAudio(type) {
            const curr = filteredDb[currentIndex];
            const base64 = (type=='word' ? curr.audioI : curr.audioJ);
            if (base64) { player.src = "data:audio/mp3;base64," + base64; player.play(); }
        }
        function nextCard() { if(currentIndex < filteredDb.length-1) { currentIndex++; render(); playAudio('word'); } }
        function prevCard() { if(currentIndex > 0) { currentIndex--; render(); playAudio('word'); } }
        function jumpCards(n) { currentIndex = Math.max(0, Math.min(filteredDb.length-1, currentIndex+n)); render(); playAudio('word'); }
        function backToGate() { document.getElementById('welcome-overlay').style.display = 'flex'; }
        window.onload = loadData;
    </script>
</body>
</html>
