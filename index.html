<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>G學園 - 中文啟盟學堂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Poppins:wght@600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="manifest" href="./manifest.json">
  
  <style>
    :root {
      --google-blue: #4285F4;
      --google-red: #EA4335;
      --google-yellow: #FBBC05;
      --google-green: #34A853;
      --text-main: #0F172A;
      --text-muted: #475569;
      --bg-app: #F8FAFC;
      --accent-blue: #536DFE;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body { 
      font-family: 'Noto Sans TC', sans-serif; 
      background-color: #CBD5E1; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
    }

    .phone-container { 
      width: 100%; 
      max-width: 414px; 
      height: 100vh; 
      max-height: 850px; 
      background-color: var(--bg-app); 
      display: flex; 
      flex-direction: column; 
      position: relative;
      overflow: hidden;
    }

    @media (min-width: 450px) {
      .phone-container { 
        height: 850px; 
        border: 10px solid #1E293B; 
        border-radius: 50px; 
        box-shadow: 0 40px 100px -20px rgba(0,0,0,0.4); 
      }
    }

    /* 啟動遮罩頁面 */
    .start-overlay { 
      position: absolute; 
      inset: 0; 
      background: linear-gradient(135deg, #536DFE 0%, #43a047 100%); 
      z-index: 200; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center;
      color: white;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .start-overlay.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.05);
    }
    .start-school-icon { font-size: 80px; margin-bottom: 20px; }
    .start-title { font-size: 32px; font-weight: 900; margin-bottom: 8px; letter-spacing: 1px; }
    .start-subtitle { font-size: 16px; opacity: 0.9; margin-bottom: 40px; }
    .start-btn {
      background: white;
      color: var(--accent-blue);
      border: none;
      padding: 16px 40px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.2s;
    }
    .start-btn:active { transform: scale(0.95); }

    /* 頂部導覽列 */
    .header {
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      border-bottom: 1px solid #E2E8F0;
    }
    .brand { display: flex; align-items: center; gap: 8px; color: var(--accent-blue); font-size: 20px; font-weight: 900; }
    .progress-badge { background: #EEF2F6; color: var(--accent-blue); padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 700; font-family: 'Poppins', sans-serif; }

    /* 主要內容區 */
    .content-area { flex: 1; padding: 24px; display: flex; flex-direction: column; justify-content: center; }

    /* 字卡主體 */
    .flashcard {
      background: white;
      border-radius: 32px;
      padding: 30px 24px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);
      display: flex;
      flex-direction: column;
      position: relative;
      min-height: 420px;
    }

    /* 藍色音訊按鈕 */
    .audio-btn {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #EEF2F6;
      color: var(--accent-blue);
      border: none;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .audio-btn:active { background: #E2E8F0; }

    /* 單字與注音區塊：修正為呼吸感並排排版 */
    .word-section {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 50px;
      margin-bottom: 16px;
    }
    .main-word { font-size: 64px; font-weight: 900; color: var(--text-main); }
    .zhuyin-box {
      font-size: 20px;
      font-weight: 700;
      color: var(--google-red);
      line-height: 1.3;
      border-left: 2px dashed #FED7D7;
      padding-left: 12px;
      white-space: pre-line;
    }

    /* 提示詞區塊 */
    .hint-container { display: flex; justify-content: center; margin-bottom: 40px; }
    .hint-tag { background: #F1F5F9; color: var(--text-muted); padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; }

    .divider { height: 1px; background: #F1F5F9; margin-bottom: 30px; }

    /* 例句與翻譯區塊 */
    .sentence-section { display: flex; flex-direction: column; gap: 12px; flex: 1; justify-content: center; }
    .sentence-zh { font-size: 22px; font-weight: 700; color: var(--google-green); text-align: center; line-height: 1.4; }
    .sentence-vi-box { background: #F8FAFC; border-radius: 16px; padding: 12px 16px; margin: 0 10px; }
    .sentence-vi { font-size: 14px; color: var(--text-muted); text-align: center; line-height: 1.5; font-weight: 500; }

    /* 底部導覽按鈕 */
    .bottom-nav { padding: 20px 24px 30px; display: flex; gap: 16px; background: white; border-top: 1px solid #E2E8F0; }
    .nav-btn {
      flex: 1;
      padding: 16px;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .btn-secondary { background: #F1F5F9; color: var(--text-muted); }
    .btn-secondary:active { background: #E2E8F0; }
    .btn-primary { background: var(--accent-blue); color: white; box-shadow: 0 8px 20px rgba(83, 109, 254, 0.3); }
    .btn-primary:active { transform: translateY(2px); box-shadow: 0 4px 10px rgba(83, 109, 254, 0.2); }
  </style>
</head>
<body>

  <div class="phone-container">
    
    <div id="start-overlay" class="start-overlay">
      <div class="start-school-icon">🏫</div>
      <div class="start-title">G學園啟盟學堂</div>
      <div class="start-subtitle">校長專屬 ・ 中越雙語卡片系統</div>
      <button class="start-btn" onclick="startLesson()">
        <i class="fas fa-bell"></i> 敲鐘開課
      </button>
    </div>

    <div class="header">
      <div class="brand"><i class="fas fa-graduation-cap"></i> G-School</div>
      <div id="progress" class="progress-badge">0 / 0</div>
    </div>

    <div class="content-area">
      <div class="flashcard">
        <button class="audio-btn" onclick="playTTS()" title="播放語音">
          <i class="fas fa-volume-up"></i>
        </button>
        
        <div class="word-section">
          <div id="card-word" class="main-word">--</div>
          <div id="card-zhuyin" class="zhuyin-box">--</div>
        </div>

        <div class="hint-container">
          <div id="card-hint" class="hint-tag">提示: --</div>
        </div>

        <div class="divider"></div>

        <div class="sentence-section">
          <div id="card-sentence-zh" class="sentence-zh">--</div>
          <div class="sentence-vi-box">
            <div id="card-sentence-vi" class="sentence-vi">--</div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <button id="prev-btn" class="nav-btn btn-secondary" onclick="prevCard()">
        <i class="fas fa-arrow-left"></i> 上一字
      </button>
      <button id="next-btn" class="nav-btn btn-primary" onclick="nextCard()">
        下一字 <i class="fas fa-arrow-right"></i>
      </button>
    </div>

  </div>

  <script>
    let cardData = [];
    let currentIndex = 0;

    // 敲鐘開課關閉遮罩
    function startLesson() {
      document.getElementById('start-overlay').classList.add('hidden');
      // 自動朗讀第一課單字
      setTimeout(playTTS, 600);
    }

    // 從外部 data.json 讀取資料
    async function loadCards() {
      try {
        const response = await fetch('./data.json');
        cardData = await response.json();
        if (cardData.length > 0) {
          renderCard();
        }
      } catch (error) {
        console.error("載入字卡資料失敗:", error);
      }
    }

    // 渲染目前的字卡資料到介面上
    function renderCard() {
      const item = cardData[currentIndex];
      document.getElementById('card-word').innerText = item.word;
      document.getElementById('card-zhuyin').innerText = item.zhuyin;
      document.getElementById('card-hint').innerText = `提示: ${item.hint}`;
      document.getElementById('card-sentence-zh').innerText = item.sentence_zh;
      document.getElementById('card-sentence-vi').innerText = item.sentence_vi;
      
      // 更新計數進度顯示 (例如: 1 / 4)
      document.getElementById('progress').innerText = `${currentIndex + 1} / ${cardData.length}`;
    }

    // 下一字邏輯
    function nextCard() {
      if (currentIndex < cardData.length - 1) {
        currentIndex++;
        renderCard();
        playTTS();
      }
    }

    // 上一字邏輯
    function prevCard() {
      if (currentIndex > 0) {
        currentIndex--;
        renderCard();
        playTTS();
      }
    }

    // TTS 語音朗讀邏輯 (精確指配中文臺灣語音)
    function playTTS() {
      if (cardData.length === 0) return;
      const currentItem = cardData[currentIndex];
      
      // 先停止目前可能正在播放的語音
      window.speechSynthesis.cancel();
      
      // 建立朗讀物件 (優先朗讀單字，隔 0.5 秒後朗讀例句)
      const textToSpeak = `${currentItem.word}。 ${currentItem.sentence_zh}`;
      const utterance = new SpeechSynthesisUtterance(textToSpeak);
      
      // 尋找最佳的台灣繁體中文字型庫
      const voices = window.speechSynthesis.getVoices();
      const twVoice = voices.find(voice => voice.lang === 'zh-TW' || voice.lang.includes('zh-Hant'));
      
      if (twVoice) {
        utterance.voice = twVoice;
      } else {
        utterance.lang = 'zh-TW'; // 備用方案設定語系
      }
      
      utterance.rate = 0.85; // 稍微調慢語速，方便學生聽得更清晰
      window.speechSynthesis.speak(utterance);
    }

    // 註冊 Service Worker (PWA 支援)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker 註冊成功'))
          .catch(err => console.log('Service Worker 註冊失敗', err));
      });
    }

    // 初始化載入
    window.addEventListener('DOMContentLoaded', loadCards);
    // 確保語音清單異步載入完成
    if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = loadCards;
    }
  </script>
</body>
</html>
