<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G學園 - 中文啟蒙學堂</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Poppins:wght@600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="./emojis.js"></script>

    <style>
        :root {
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC05;
            --google-green: #34A853;
            --text-main: #0F172A;
            --text-muted: #475569;
            --bg-app: #F8FAFC;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #CBD5E1; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .phone-container { width: 100%; max-width: 414px; height: 100vh; max-height: 850px; background-color: var(--bg-app); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        @media (min-width: 450px) { .phone-container { height: 820px; border: 12px solid #1E293B; border-radius: 40px; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.4); } }
        
        /* 首頁大門 */
        #welcome-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(135deg, #4285F4, #34A853); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; transition: all 0.5s ease; }
        .school-gate-icon { font-size: 80px; margin-bottom: 20px; animation: bounce 2s infinite; }
        .welcome-title { font-size: 28px; font-weight: 900; margin-bottom: 8px; letter-spacing: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.15); }
        .welcome-subtitle { font-size: 14px; opacity: 0.9; margin-bottom: 40px; }
        .enter-btn { background: #FFFFFF; color: var(--google-blue); padding: 16px 40px; border-radius: 30px; font-size: 18px; font-weight: 700; border: none; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        .app-header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; background: #FFFFFF; border-bottom: 1px solid #E2E8F0; height: 65px; }
        .app-title { font-weight: 900; color: var(--google-blue); font-size: 20px; }
        .counter { background: #EEF2F6; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 700; color: var(--google-blue); font-family: 'Poppins', sans-serif; }
        
        /* 卡片區域 */
        .card-area { flex: 1; padding: 12px 20px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .study-card { background: white; border-radius: 32px; padding: 20px; box-shadow: 0 10px 30px rgba(15,23,42,0.04); display: flex; flex-direction: column; position: relative; height: 530px; box-sizing: border-box; }
        
        .card-id { position: absolute; top: 16px; left: 24px; font-family: 'Poppins', sans-serif; font-size: 24px; font-weight: 900; color: #94A3B8; }
        
        /* 圖形視覺區 */
        .graphic-display-zone { height: 90px; display: flex; justify-content: center; align-items: center; margin-top: 20px; }
        .emoji-style { font-size: 65px; line-height: 1; }
        .svg-container { width: 85px; height: 85px; display: flex; justify-content: center; align-items: center; }
        .svg-container svg { width: 100%; height: 100%; object-fit: contain; }

        /* 🔴 單詞核心區 */
        .word-main-zone { height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; }
        .pinyin-text { font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 600; color: var(--google-red); }
        
        .word-speaker-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 2px; }
        .main-word { font-size: 48px; font-weight: 900; color: var(--text-main); letter-spacing: -1px; line-height: 1.1; }
        .main-word.long-word { font-size: 34px; } 
        
        .word-audio-btn { width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; background: var(--google-red); color: #FFFFFF; box-shadow: 0 4px 10px rgba(234, 67, 53, 0.25); transition: transform 0.1s; }
        .word-audio-btn:active { transform: scale(0.9); }
        
        .zhuyin-text { font-size: 15px; font-weight: 700; color: var(--google-green); margin-top: 2px; min-height: 20px; }
        
        .divider { height: 1px; background: #F1F5F9; margin-top: 5px; margin-bottom: 10px; }
        
        /* 🔵 例句區 */
        .sentence-section { display: flex; flex-direction: column; gap: 8px; height: 160px; justify-content: center; }
        
        .sentence-speaker-row { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 0 4px; }
        .target-sentence { font-size: 19px; font-weight: 700; color: var(--text-main); text-align: center; line-height: 1.4; flex: 1; }
        .highlight-keyword { color: var(--google-red) !important; font-weight: 900 !important; }
        
        .sentence-audio-btn { width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; background: var(--google-blue); color: #FFFFFF; box-shadow: 0 4px 10px rgba(66, 133, 244, 0.2); flex-shrink: 0; }
        .sentence-audio-btn:active { transform: scale(0.9); }

        .translation-box { background: #F8FAFC; border-radius: 16px; padding: 10px; border: 1px solid #F1F5F9; height: 64px; display: flex; align-items: center; justify-content: center; }
        .translation-sentence { font-size: 13px; color: var(--text-muted); text-align: center; line-height: 1.4; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* 底部導航按鈕 */
        .nav-bar { padding: 15px 24px 25px; display: flex; gap: 16px; background: white; border-top: 1px solid #E2E8F0; height: 95px; box-sizing: border-box; }
        .nav-btn { flex: 1; height: 54px; border-radius: 24px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-prev { background: #F1F5F9; color: var(--text-main); }
        .btn-next { background: var(--google-blue); color: white; box-shadow: 0 8px 20px rgba(66, 133, 244, 0.3); }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-15px); } 60% { transform: translateY(-7px); } }
    </style>
</head>
<body>

    <div class="phone-container">
        <div id="welcome-overlay">
            <div class="school-gate-icon">🏛️</div>
            <div class="welcome-title">G學園啟盟學堂</div>
            <div class="welcome-subtitle">歡迎校長與寶貝蒞臨</div>
            <button class="enter-btn" onclick="enterSchool()">開啟學堂大門</button>
        </div>

        <div class="app-header">
            <div class="app-title"><i class="fas fa-graduation-cap"></i> G-School</div>
            <div id="card-counter" class="counter">0 / 0</div>
        </div>

        <div class="card-area">
            <div class="study-card">
                <span id="lbl-id" class="card-id">--</span>

                <div id="graphic-zone" class="graphic-display-zone"></div>

                <div class="word-main-zone">
                    <span id="lbl-pinyin" class="pinyin-text">--</span>
                    <div class="word-speaker-row">
                        <div id="lbl-word" class="main-word">--</div>
                        <button class="word-audio-btn" onclick="playWordAudioOnly()"><i class="fas fa-volume-up"></i></button>
                    </div>
                    <div id="lbl-zhuyin" class="zhuyin-text">--</div>
                </div>
                
                <div class="divider"></div>
                
                <div class="sentence-section">
                    <div class="sentence-speaker-row">
                        <div id="lbl-sentence-zh" class="target-sentence">--</div>
                        <button class="sentence-audio-btn" onclick="playSentenceAudioOnly()"><i class="fas fa-volume-up"></i></button>
                    </div>
                    <div class="translation-box">
                        <div id="lbl-sentence-vi" class="translation-sentence">--</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="nav-bar">
            <button class="nav-btn btn-prev" onclick="prevCard()"><i class="fas fa-arrow-left"></i> 上一字</button>
            <button class="nav-btn btn-next" onclick="nextCard()">下一字 <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <audio id="local-audio-player" preload="auto"></audio>

    <script>
        // 💡 提示：原本這裡有一大坨佔空間的舊代碼字典，現在已經被完全放逐移到專屬的 emojis.js 檔案中了！主程式碼重回極簡、專業與乾淨！

        let db = [];
        let currentIndex = 0;
        let audioCtx = null;
        const audioPlayer = document.getElementById('local-audio-player');

        function enterSchool() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById("welcome-overlay").style.opacity = "0";
            setTimeout(() => { document.getElementById("welcome-overlay").style.display = "none"; }, 500);
            playSchoolBell();
            setTimeout(() => { playWordAudioOnly(); }, 1200);
        }

        function playSchoolBell() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const playTone = (startTime, frequency, duration) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(frequency, startTime);
                    gain.gain.setValueAtTime(0.25, startTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(startTime); osc.stop(startTime + duration);
                };
                let now = audioCtx.currentTime;
                playTone(now, 523.25, 0.9); playTone(now + 0.5, 659.25, 0.9); playTone(now + 1.0, 587.33, 0.9); playTone(now + 1.5, 392.00, 1.3);
            } catch(e) {}
        }

        async function loadCardsFromMD() {
            try {
                const response = await fetch(`./data.md?v=${Date.now()}`);
                const text = await response.text();
                const lines = text.split('\n');
                let tempDb = [];
                
                lines.forEach(line => {
                    if (line.includes('|')) {
                        const cols = line.split('|').map(c => c.trim());
                        if (cols.length >= 10 && cols[1] && !cols[1].includes('---') && !cols[1].includes('編號')) {
                            tempDb.push({
                                id: cols[1], 
                                word: cols[2], 
                                pinyin: cols[3], 
                                zhuyin: cols[4], 
                                sentence_zh: cols[5], 
                                sentence_vi: cols[6],
                                graphic: cols[7],       
                                word_audio: cols[8],     
                                sentence_audio: cols[9]  
                            });
                        }
                    }
                });
                if(tempDb.length > 0) { db = tempDb; renderCard(); }
            } catch (error) { console.error(error); }
        }

        function renderCard() {
            if(db.length === 0) return;
            const current = db[currentIndex];
            
            document.getElementById("lbl-id").textContent = current.id || "";
            
            // 🎯 【智慧渲染引擎：手造 SVG ➡️ 手造 Emoji ➡️ 外部大圖庫智慧對應】
            const graphicZone = document.getElementById("graphic-zone");
            graphicZone.innerHTML = ""; 
            
            const keyword = current.word || "";
            let rawGraphic = current.graphic || "";
            
            // 優先權 1：如果試算表 H 欄有手貼 SVG
            if (rawGraphic && rawGraphic.includes("<svg")) {
                graphicZone.innerHTML = `<div class="svg-container">${rawGraphic}</div>`;
            } 
            // 優先權 2：如果試算表 H 欄有手動填特定 Emoji
            else if (rawGraphic) {
                graphicZone.innerHTML = `<span class="emoji-style">${rawGraphic}</span>`;
            } 
            // 優先權 3：如果試算表留白，自動偵測讀取我們外掛引進來的 window.emojiDictionary 大庫！
            else if (window.emojiDictionary && window.emojiDictionary[keyword]) {
                graphicZone.innerHTML = `<span class="emoji-style">${window.emojiDictionary[keyword]}</span>`;
            }
            // 優先權 4：無對應時安全留白

            const wordEl = document.getElementById("lbl-word");
            wordEl.textContent = keyword;
            if (keyword.length >= 4) { wordEl.classList.add("long-word"); } else { wordEl.classList.remove("long-word"); }

            document.getElementById("lbl-pinyin").textContent = current.pinyin || "";
            document.getElementById("lbl-zhuyin").textContent = current.zhuyin || "--";
            
            const rawSentence = current.sentence_zh || "--";
            if (keyword && rawSentence.includes(keyword)) {
                document.getElementById("lbl-sentence-zh").innerHTML = rawSentence.replace(new RegExp(keyword, 'g'), `<span class="highlight-keyword">${keyword}</span>`);
            } else {
                document.getElementById("lbl-sentence-zh").textContent = rawSentence;
            }
            
            document.getElementById("lbl-sentence-vi").textContent = current.sentence_vi || "--";
            document.getElementById("card-counter").textContent = `${currentIndex + 1} / ${db.length}`;
        }

        function nextCard() { if (currentIndex < db.length - 1) { currentIndex++; renderCard(); playWordAudioOnly(); } }
        function prevCard() { if (currentIndex > 0) { currentIndex--; renderCard(); playWordAudioOnly(); } }

        function playPackagedAudio(base64Data) {
            if (!base64Data) return;
            try {
                audioPlayer.pause();
                audioPlayer.src = "data:audio/mp3;base64," + base64Data;
                audioPlayer.play().catch(e => console.log(e));
            } catch(e) {}
        }

        function playWordAudioOnly() {
            if(db.length > 0 && db[currentIndex].word_audio) {
                playPackagedAudio(db[currentIndex].word_audio);
            }
        }

        function playSentenceAudioOnly() {
            if(db.length > 0 && db[currentIndex].sentence_audio) {
                playPackagedAudio(db[currentIndex].sentence_audio);
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log(err)); });
        }
        window.addEventListener('DOMContentLoaded', loadCardsFromMD);
    </script>
</body>
</html>
